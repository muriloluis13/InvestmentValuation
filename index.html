            <div style="padding:8px 10px;background:var(--cream);">Cost of Equity (Ke)</div>
            <div style="padding:8px 10px;background:var(--cream);">WACC</div>
            <div style="padding:8px 10px;background:var(--cream);">WACC</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Best For</div>
            <div style="padding:8px 10px;background:var(--warm-white);">Stable leverage, single-business</div>
            <div style="padding:8px 10px;background:var(--warm-white);">High/shifting leverage</div>
            <div style="padding:8px 10px;background:var(--warm-white);">Cash-heavy firms</div>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">⚙️</span><span class="myth-title">Consistency Is Non-Negotiable</span></div>
          <div class="myth-body">
            If you net out cash in enterprise value (numerator), you must also net out cash in the denominator — that is what makes it "invested capital" rather than "book capital." If you convert operating leases to debt in the numerator, you must mirror that in book capital. Two common mistakes that bias the multiple: <strong>(1)</strong> using book value of <em>assets</em> instead of capital (inflated by current liabilities); <strong>(2)</strong> using EV in the numerator but leaving cash in the denominator.
          </div>
        </div>

        <p>The case for V/B over P/B is strongest for firms with <strong>high or shifting leverage</strong>. Leverage amplifies ROE: in good times, highly levered firms show spectacular ROE; in bad times, very low or negative ROE. This volatility makes P/B unreliable as a signal. V/B and ROC are more stable and thus yield more dependable relative-value signals. V/B can also be computed for firms with negative book equity — a practical advantage.</p>

        <div style="margin:18px 0;padding:16px;background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);">
          <strong style="font-size:14px;">EVA and MVA: The Value-to-Book Connection</strong>
          <p style="font-size:12.5px;color:var(--text-secondary);margin:8px 0 0;">Market Value Added (MVA = Market Value − Book Value of Capital) is just a rearrangement of V/B. Economic Value Added (EVA = (ROC − WACC) × Capital Invested) is the return-spread driver. The high correlation between EVA and MVA that Stern Stewart & Co. marketed is not surprising — it follows directly from the V/B = f(ROC − WACC) relationship.</p>
        </div>
      </div>`,

      // Section 4: Tobin's Q: Market Value/Replacement Cost
      `<div class="rich-content">
        <p><strong>Tobin's Q</strong> compares the market value of a firm's assets to their replacement cost. It was proposed by James Tobin as an alternative to accounting-based measures: if assets are used efficiently (earning above required returns), Q exceeds 1; if assets are poorly managed or obsolete, Q falls below 1.</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;line-height:2;">
          Tobin's Q = Market Value of Assets / Replacement Cost of Assets<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">If ROC = WACC → NPV of investments = 0 → PV of cash flows = replacement cost → Q = 1</span>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:18px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">
            <span style="font-size:20px;">✅</span>
            <h4 style="font-family:'Fraunces',serif;font-size:13px;font-weight:600;margin:8px 0 6px;color:var(--forest);">Conceptual Advantage</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.55;margin:0;">In inflationary times, replacement cost updates asset values better than historical-cost book values. In deflationary tech sectors, replacement cost drops faster than book, making Q more informative than P/B.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <span style="font-size:20px;">❌</span>
            <h4 style="font-family:'Fraunces',serif;font-size:13px;font-weight:600;margin:8px 0 6px;color:var(--terracotta);">Practical Limitations</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.55;margin:0;">True replacement cost is hard to estimate — especially for intangible-heavy or specialized assets. Cross-sectional distributions cannot be computed because the data is not widely available. In practice, most analysts use book value of assets as a proxy, making Q collapse back to V/B.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid #2A7B9B;">
            <span style="font-size:20px;">🎯</span>
            <h4 style="font-family:'Fraunces',serif;font-size:13px;font-weight:600;margin:8px 0 6px;color:#2A7B9B;">Takeover & Restructuring Signal</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.55;margin:0;">Low Q signals underutilized assets or poor management. Lang, Stulz & Walkling (1991) found that low-Q firms are more likely to be taken over for restructuring. High-Q bidders gain more from acquisitions than low-Q bidders.</p>
          </div>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Tobin's Q asks: "What would it cost to rebuild this business from scratch today?" If the market says the business is worth less than rebuild cost (Q < 1), either the assets are poorly managed (someone else could run them better) or the rebuild estimate is wrong. If Q > 1, the franchise earns superior economics that cannot be replicated just by buying the same physical assets — the excess comes from brand, talent, network effects, or market position.</p>
        </div>

        <div class="key-takeaway">
          <div class="kt-label">🎯 Chapter 19 — The Big Picture</div>
          <ul>
            <li><strong>P/B is fundamentally a spread story:</strong> ROE versus cost of equity drives whether P/B should be below, near, or above 1. The simplified stable-growth formula — P/B = (ROE − g) / (Ke − g) — makes this explicit.</li>
            <li><strong>The most informative mismatch is not "low multiple" alone,</strong> but low P/B paired with strong expected ROE, or high P/B paired with weak expected ROE. The four-quadrant matrix is the core analytical tool.</li>
            <li><strong>ROE is the companion variable for P/B</strong> — just as growth is for P/E and margin is for P/S. When a stock looks cheap on P/B, the first thing to check is its ROE.</li>
            <li><strong>Low P/B strategies earn excess returns globally,</strong> but the debate over whether this is mispricing or risk compensation remains unresolved. Quality filters (ROE, earnings stability, low leverage) help avoid value traps.</li>
            <li><strong>Value-to-book (V/B) and EV/Invested Capital</strong> translate the same logic to firm level, using ROC vs. WACC instead of ROE vs. Ke. Prefer these for firms with high or shifting leverage.</li>
            <li><strong>Tobin's Q is conceptually elegant but data-hungry;</strong> in practice it collapses to an inflation-adjusted V/B. Its strongest use is as a management-quality and takeover signal rather than as a valuation multiple.</li>
          </ul>
        </div>
      </div>`
    ]
  },
  20: {
    subtitle: "Revenue multiples are the bluntest tool in the valuation box — they stay usable when earnings are negative, but they only create insight when profit margins, reinvestment, growth, and risk are brought back into the analysis. Sector-specific multiples (EV/subscriber, EV/barrel) add a second layer of operating-unit logic, but the same DCF fundamentals ultimately drive them all.",
    sections: [
      // Section 0: Revenue Multiples
      `<div class="rich-content">
        <p>Revenue multiples became popular because they remain usable when earnings are negative — which makes them the default entry point for young, loss-making, or cyclical firms. They are less affected by accounting choices than earnings or book-value metrics, and usually less volatile than P/E for cyclical businesses. But the biggest disadvantage is equally clear: focusing on revenue can lull you into assigning high values to firms generating impressive top-line growth while losing significant amounts of money.</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;">
          <div style="background:rgba(45,95,74,0.06);border:1px solid rgba(45,95,74,0.15);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">
            <h4 style="font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin-bottom:10px;color:var(--forest);">Price-to-Sales (P/S)</h4>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin:0 0 8px;"><strong>Numerator:</strong> Market value of equity. <strong>Denominator:</strong> Total revenue.</p>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin:0;">Quick and popular, but leverage distorts comparisons: a highly levered firm will mechanically show a lower P/S than an identical unlevered firm because the equity slice is smaller. Two firms with the same operations but different capital structures will trade at different P/S ratios.</p>
          </div>
          <div style="background:rgba(196,101,46,0.06);border:1px solid rgba(196,101,46,0.15);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin-bottom:10px;color:var(--terracotta);">EV-to-Sales (EV/Sales)</h4>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin:0 0 8px;"><strong>Numerator:</strong> Enterprise value (equity + debt − cash). <strong>Denominator:</strong> Total revenue.</p>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin:0;">More internally consistent: both numerator and denominator refer to the entire firm, so leverage differences across peers do not distort the comparison. Damodaran considers this the more robust of the two revenue multiples.</p>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Why Revenue Multiples? Three Advantages</p>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">
            <span style="font-size:20px;">✅</span>
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin:8px 0 6px;color:var(--forest);">Always Available</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.55;margin:0;">Unlike P/E or P/B, which become meaningless when earnings or book equity are negative, revenue multiples can be computed for virtually every firm. The potential for sample bias from eliminating firms is far lower.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <span style="font-size:20px;">🛡️</span>
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin:8px 0 6px;color:var(--terracotta);">Hard to Manipulate</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.55;margin:0;">Earnings and book value are heavily influenced by depreciation, R&D accounting, acquisition goodwill, and extraordinary charges. Revenue is relatively difficult to manipulate (though not impossible — installment sales and intercompany transactions have been abused).</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid #2A7B9B;">
            <span style="font-size:20px;">📊</span>
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin:8px 0 6px;color:#2A7B9B;">Less Volatile</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.55;margin:0;">For cyclical firms, P/E swings wildly because earnings are highly sensitive to the cycle. Revenue multiples are far more stable, since revenues decline less than profits during downturns.</p>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">⚠️</span><span class="myth-title">The Revenue Trap</span></div>
          <div class="myth-body">
            High revenue growth can mask weak economics. A firm with fast top-line growth but structurally poor margins can look "cheap on sales" and still destroy value. Ultimately, a firm has to generate earnings and cash flows for it to have value. The failure to control for differences in costs and profit margins across firms can lead to misleading valuations.
          </div>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Comparing companies only on revenue is like valuing restaurants by number of meals served without checking food cost, rent, and labor efficiency. A diner serving 500 meals a day at a loss is worth less than a bistro serving 100 at healthy margins. Throughput matters, but unit economics decide value.</p>
        </div>
      </div>`,

      // Section 1: Sector-Specific Multiples
      `<div class="rich-content">
        <p><strong>Sector-specific multiples</strong> standardize value by operating units rather than financial quantities. They became especially popular during the dot-com era when firms had no earnings, little revenue, and analysts needed <em>some</em> anchor. The logic: if each unit (subscriber, barrel, member) maps into future cash flows, value per unit becomes a reasonable proxy for value.</p>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin:18px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">
            <span style="font-size:22px;">🛢️</span>
            <h4 style="font-family:'Fraunces',serif;font-size:13px;font-weight:600;margin:8px 0 6px;color:var(--forest);">EV / Barrel of Reserves</h4>
            <p style="font-size:11.5px;color:var(--text-secondary);line-height:1.5;margin:0;">Oil & gas companies. Units are homogeneous (a barrel is a barrel). Works well when commodity quality is similar.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <span style="font-size:22px;">🏭</span>
            <h4 style="font-family:'Fraunces',serif;font-size:13px;font-weight:600;margin:8px 0 6px;color:var(--terracotta);">EV / Ton of Capacity</h4>
            <p style="font-size:11.5px;color:var(--text-secondary);line-height:1.5;margin:0;">Steel, cement, commodity chemicals. Comparable if production quality and cost structure are similar.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid #2A7B9B;">
            <span style="font-size:22px;">📡</span>
            <h4 style="font-family:'Fraunces',serif;font-size:13px;font-weight:600;margin:8px 0 6px;color:#2A7B9B;">EV / Subscriber</h4>
            <p style="font-size:11.5px;color:var(--text-secondary);line-height:1.5;margin:0;">Cable, telecom, SaaS. Subscribers pay recurring fees, so the link to cash flows is direct — if churn, ARPU, and costs are comparable.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid #7B68A8;">
            <span style="font-size:22px;">👥</span>
            <h4 style="font-family:'Fraunces',serif;font-size:13px;font-weight:600;margin:8px 0 6px;color:#7B68A8;">EV / Member (or Visitor)</h4>
            <p style="font-size:11.5px;color:var(--text-secondary);line-height:1.5;margin:0;">Social media, portals. Units are not homogeneous — the value per Facebook member differs vastly from a Twitter follower. Most problematic of all sector-specific multiples.</p>
          </div>
        </div>

        <p>Damodaran shows that even these "alternative" multiples can be derived from a DCF model. For a subscriber-based firm, the value per subscriber equals the present value of net cash flows generated per subscriber over their expected tenure, plus the value created by future subscriber additions (only if the cost of acquiring a new subscriber is less than the value that subscriber creates).</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:12.5px;text-align:center;line-height:2;">
          Value/Subscriber = PV(CF per subscriber) + [PV(New subscribers × (V − Cost per acquisition))] / N<sub>existing</sub><br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">GOL example: 1M subscribers, $100/yr net CF, 3-yr life, 15% WACC → $228/subscriber from existing base</span>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">🔍</span><span class="myth-title">Tunnel Vision and Sector Bubbles</span></div>
          <div class="myth-body">
            <p>Two significant problems: <strong>(1) Tunnel vision.</strong> A firm at $50/subscriber can look cheap next to one at $125/subscriber, but both may be wildly overpriced. Sector-focused analysts can talk themselves into ever-higher valuations by staying within one metric. <strong>(2) Non-homogeneous units.</strong> The relationship between sector-specific multiples and fundamentals is complex. A LinkedIn member (professional, revenue-generating) is worth far more than a Twitter follower (casual, monetization uncertain). Comparing EV/member across the two is misleading.</p>
          </div>
        </div>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin:18px 0;">
          <div style="font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;">Social Media Valuations — May 2011 Snapshot</div>
          <div style="display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;gap:2px;font-size:12px;">
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:var(--radius-sm) 0 0 0;">Company</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;">Enterprise Value</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;">Members/Users</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;">EV/Member</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:0 var(--radius-sm) 0 0;">EV/Sales</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">LinkedIn</div>

            <div style="padding:8px 10px;background:var(--warm-white);">100M</div>
            <div style="padding:8px 10px;background:var(--warm-white);">~$100</div>

            <div style="padding:8px 10px;background:var(--cream);">$8.5B</div>
            <div style="padding:8px 10px;background:var(--cream);">663M</div>

            <div style="padding:8px 10px;background:var(--cream);">4,615×</div>
          </div>
          <p style="font-size:11.5px;color:var(--text-muted);margin:10px 0 0;font-style:italic;">Twitter at $38/member looks cheap vs. Facebook at $117, but Twitter's revenue model was speculative. On EV/Sales, Twitter at 4,615× was absurdly valued. Sector-specific multiples without fundamentals are dangerous.</p>
        </div>
      </div>`,

      // Section 2: Determinants of Value
      `<div class="rich-content">
        <p>The same DCF engine drives revenue multiples. Damodaran derives the P/S and EV/Sales formulas directly from the dividend discount model and the firm valuation model, making one point unmistakable: <strong>the key companion variable for revenue multiples is the profit margin.</strong></p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--forest);">P/S → Net Profit Margin</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">P/S rises with higher net margins, higher payout (or FCFE conversion), higher expected growth, and lower cost of equity. A firm with a 10% net margin and 20% growth deserves a far higher P/S than one with 2% margin and the same growth.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--terracotta);">EV/Sales → After-Tax Operating Margin</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">EV/Sales rises with higher ATOM, lower reinvestment intensity (for a given growth rate), higher growth quality, and lower WACC. The companion variable is the after-tax operating margin (ATOM = EBIT × (1−t) / Sales).</p>
          </div>
        </div>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin:18px 0;">
          <div style="font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;">Companion Variables — All Multiples at a Glance</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;font-size:12px;">
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:var(--radius-sm) 0 0 0;">Multiple</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:0 var(--radius-sm) 0 0;">Companion Variable</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">P/E</div>
            <div style="padding:8px 10px;background:var(--warm-white);">Expected growth rate in EPS</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">P/B</div>
            <div style="padding:8px 10px;background:var(--cream);">Return on Equity (ROE)</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">P/S</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:600;color:var(--forest);">Net Profit Margin</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">EV/EBITDA</div>
            <div style="padding:8px 10px;background:var(--cream);">Reinvestment rate (tax, D&A, capex)</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">EV/Invested Capital</div>
            <div style="padding:8px 10px;background:var(--warm-white);">Return on Invested Capital (ROIC)</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">EV/Sales</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:600;color:var(--terracotta);">After-Tax Operating Margin (ATOM)</div>
          </div>
          <p style="font-size:11.5px;color:var(--text-muted);margin:10px 0 0;font-style:italic;">To find the companion variable: divide the "income" measure that matches the multiple's logic by the denominator. For P/B → Net Income ÷ Book Equity = ROE. For EV/Sales → After-tax Operating Income ÷ Sales = ATOM.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">The Margin → Return → Growth Chain</p>

        <p>Margin compression hits value twice — directly (lower multiple) and indirectly (lower returns and growth quality). This is because margins feed into the DuPont decomposition of returns:</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;line-height:2.2;">
          ROE = Net Margin × (Sales / Book Equity)<br>
          ROC = After-Tax Operating Margin × (Sales / Invested Capital)<br>
          g = Retention × ROE &nbsp;&nbsp;|&nbsp;&nbsp; g = Reinvestment Rate × ROC<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">Whole Foods: 2.73% margin × 5.53 turnover = 15.11% ROE → with 66% retention → 10% growth</span><br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">Coca-Cola: 14.43% ATOM × 1.11 turnover = 16.00% ROC → with 60% reinvestment → 9.6% growth</span>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Revenue is the fuel pumped into the engine; margin and capital efficiency determine how much of that fuel becomes useful power. Two cars can consume the same liters per kilometer and deliver very different horsepower. Valuing both by fuel consumption alone is nonsensical — you need to know engine efficiency.</p>
        </div>
      </div>`,

      // Section 3: Using Revenue Multiples in Investment Analysis
      `<div class="rich-content">
        <p>Damodaran describes a multi-stage workflow for applying revenue multiples in practice. The approach escalates from simple visual screening to full statistical control, and includes a powerful framework for valuing brand names.</p>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Step 1: The Mismatch Matrix</p>

        <p>Plot revenue multiples against margins for all firms in a sector. The four quadrants reveal candidates for further investigation:</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin:16px 0;">
          <div style="padding:16px;background:rgba(45,95,74,0.08);border-radius:var(--radius-sm) 0 0 0;border:1px solid rgba(45,95,74,0.15);">
            <strong style="font-size:13px;color:var(--forest);">🟢 High Margin + Low Multiple</strong>
            <p style="font-size:12px;color:var(--text-secondary);margin:6px 0 0;">Potentially <strong>undervalued</strong>. The market may be underpricing the margin quality, or there is a risk/growth factor the margin alone does not capture.</p>
          </div>
          <div style="padding:16px;background:rgba(45,95,74,0.04);border-radius:0 var(--radius-sm) 0 0;border:1px solid var(--border);">
            <strong style="font-size:13px;color:var(--text-secondary);">⚪ High Margin + High Multiple</strong>
            <p style="font-size:12px;color:var(--text-secondary);margin:6px 0 0;">Consistent. High margins justify a high multiple. No mismatch — but the premium may still be excessive if growth expectations are unrealistic.</p>
          </div>
          <div style="padding:16px;background:rgba(196,101,46,0.04);border-radius:0 0 0 var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:13px;color:var(--text-secondary);">⚪ Low Margin + Low Multiple</strong>
            <p style="font-size:12px;color:var(--text-secondary);margin:6px 0 0;">Consistent. Weak economics justify a low multiple. Often a value trap — cheap for a reason.</p>
          </div>
          <div style="padding:16px;background:rgba(196,101,46,0.08);border-radius:0 0 var(--radius-sm) 0;border:1px solid rgba(196,101,46,0.15);">
            <strong style="font-size:13px;color:var(--terracotta);">🔴 Low Margin + High Multiple</strong>

        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Step 2: Regression Controls</p>

        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">1</span>
            <div>
              <strong style="font-size:14px;">Narrow Regression (Same Business)</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">Regress EV/Sales on operating margin across peers. Simple, intuitive. Works well for mature sectors with stable margins (specialty retailers R² ≈ 40-50%).</span>

          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">

            <div>
              <strong style="font-size:14px;">Extended Regression (Add Growth + Risk)</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">When sample size supports it, add expected growth and volatility (or beta) as independent variables. For specialty retailers: adding σ(operating income) and analyst growth pushed R² from 40% to 50%. Use nonlinear forms (log margin) when the relationship is curved.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">3</span>
            <div>
              <strong style="font-size:14px;">Market-Wide Regression</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">For the broadest benchmark, regress across all firms in the market: P/S = f(margin, payout, beta, growth). This was done for U.S. stocks 1987-2011 and extended to Europe, Japan, and emerging markets. Operating margin dominated everywhere.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">4</span>
            <div>
              <strong style="font-size:14px;">Multiples of Future Revenues (Young Firms)</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">For firms with trivial current revenue but high expected growth (e.g., Tesla at $117M revenue in 2010), use projected revenue in year 5-10 and apply the multiple of mature peers to the future revenue, then discount back. Three variants: use peer's current EV/Sales on future revenue, use peer's current EV ÷ future revenue, or adjust the peer multiple for the firm's own expected margin and growth at the horizon.</span>
            </div>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">📉</span><span class="myth-title">Current Margins Are Not Destiny</span></div>
          <div class="myth-body">
            In transition sectors (Internet stocks in 2000, social media in 2011), current margins may have little correlation with future margins. The regression of P/S against current net margin for Internet retailers in July 2000 had an R² near zero with a <em>negative</em> coefficient — high-revenue-growth firms were priced on future potential, not current profitability. When regressions are this noisy, they should lower confidence, not raise conviction.

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Step 3: Pricing Strategy and Brand-Name Value</p>

        <p>Revenue multiples connect naturally to pricing strategy. Every firm must choose between a <strong>high-margin / low-volume</strong> path (price leader) and a <strong>low-margin / high-volume</strong> path (volume leader). The optimal strategy is the one that maximizes value, and the P/S framework reveals the answer by computing value under each scenario.</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;">
          <div style="background:rgba(45,95,74,0.06);border:1px solid rgba(45,95,74,0.15);border-radius:var(--radius-sm);padding:16px;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--forest);">Volume Leader</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Lower margin (5%), higher turnover (S/BV = 4.0). ROE = 20%. In the textbook example: P/S = 1.00, Value = $39.86/share. Works best when demand is elastic.</p>
          </div>
          <div style="background:rgba(196,101,46,0.06);border:1px solid rgba(196,101,46,0.15);border-radius:var(--radius-sm);padding:16px;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--terracotta);">Price Leader</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Higher margin (10%), lower turnover (S/BV = 2.5). ROE = 25%. In the textbook example: P/S = 2.35, Value = $58.81/share. Wins here because margin premium dominates.</p>
          </div>
        </div>

        <p>The brand-name application follows the same logic: a brand allows a firm to charge higher prices, producing higher margins and higher return on capital. The <strong>value of the brand = Value(with brand margins) − Value(with generic margins)</strong>.</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin:18px 0;">
          <div style="font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;">Coca-Cola Brand Name Valuation — Three Approaches (May 2011)</div>
          <div style="display:grid;grid-template-columns:2fr 1.2fr 1.2fr 1.2fr;gap:2px;font-size:12px;">
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:var(--radius-sm) 0 0 0;">Scenario</div>

            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Option 2: Cott's margin + turnover</div>

            <div style="padding:8px 10px;background:var(--warm-white);">$43.0B</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:600;color:var(--terracotta);">$80.2B</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Option 3: No excess returns at all</div>

          <p style="font-size:11.5px;color:var(--text-muted);margin:10px 0 0;font-style:italic;">Damodaran considers Option 2 (brand affects both pricing power and sales efficiency) the most realistic: ~$80B of Coca-Cola's $123B value is attributable to the brand name.</p>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">🏷️</span><span class="myth-title">Never Add a "Brand Premium" to DCF</span></div>
          <div class="myth-body">
            <div class="myth-verdict">Done right, the value of a brand name is already embedded in the DCF through higher margins, higher turnover ratios, and higher returns on capital — which flow into higher growth and higher value. Adding an arbitrary "brand premium" on top is double counting. The only exception: if you believe the brand is underexploited by current management, you can estimate a <em>control premium</em> — the value from improving margins to their brand-justified level.</div>
          </div>
        </div>
      </div>`,

      // Section 4: Chapter takeaway
      `<div class="rich-content">
        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:20px 0 12px;color:var(--text-primary);">Tracking Mismatch Over Time: Whole Foods (2007-2011)</p>

        <p>Damodaran tracks Whole Foods across four years to show how the mismatch framework plays out as an investment strategy. In each year, he regresses P/S against net margin for the grocery sector and checks whether Whole Foods is above or below the regression line.</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin:18px 0;">
          <div style="font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;">Whole Foods — Revenue Multiple vs. Margin Over Time</div>

            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;">Net Margin</div>

            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:0 var(--radius-sm) 0 0;">Verdict</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Jan 2007</div>
            <div style="padding:8px 10px;background:var(--warm-white);">3.41%</div>
            <div style="padding:8px 10px;background:var(--warm-white);">1.41</div>
