      // Section 3: Consequences for Decision Making
      `<div class="rich-content">
        <p>The equity-as-option framework transforms how we think about decisions at distressed firms — from capital structure to investment policy to the design of debt contracts. Damodaran draws out the practical consequences for each stakeholder: <strong>equity holders, creditors, regulators, and investors</strong>.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Understanding the option dynamics in distressed firms is like understanding the incentives of a renter vs. a homeowner during a flood. The homeowner (equity with skin in the game) fights to save the house. The renter (equity with nothing left to lose) might prefer to let it flood and collect insurance. In distressed firms, equity holders whose option is deep out-of-the-money are "renters" — they have every incentive to take risks with "someone else's house" (the creditors' assets).</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Implications by Stakeholder</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-left:4px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--terracotta);">For Equity Investors</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Distressed equity can be an attractive <em>speculative</em> investment — you're buying cheap out-of-the-money options. If the firm recovers, returns are enormous. But the expected loss rate is high: most distressed firms stay distressed or go bankrupt. The key is portfolio diversification across many distressed names — you need the "winners" to compensate for the many "zeros."</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-left:4px solid var(--forest);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--forest);">For Creditors / Bondholders</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Recognize that your interests are <strong>directly opposed</strong> to equity in distress. Equity holders want risk, time, and dividends — all of which destroy debt value. Protect yourself with covenants (restrictions on dividends, asset sales, new debt), accelerated maturities, and — when necessary — forcing bankruptcy to stop the value transfer.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-left:4px solid #7B68A8;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:#7B68A8;">For Managers</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Your equity-linked compensation creates a dangerous alignment with risk-taking. Ethical managers should recognize this conflict and make investment decisions that maximize <strong>firm value</strong> (equity + debt), not just equity value. Projects that increase equity value by increasing variance — while destroying total firm value — are value-destroying even if they benefit shareholders.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-left:4px solid #2A7B9B;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:#2A7B9B;">For Regulators</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Financial institutions (banks, insurance companies) are highly levered by design — their equity is always an option on assets. When the option goes deep out-of-the-money, "gambling for resurrection" becomes the dominant incentive. Regulators must intervene <em>before</em> this point — through capital requirements, prompt corrective action, and restrictions on risk-taking as capital ratios decline.</p>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Debt-for-Equity Swaps Through the Option Lens</p>

        <p>Restructurings often involve converting debt into equity. Through the option lens, this <strong>lowers the strike price</strong> (less debt to repay) and <strong>increases the underlying</strong> (the equity claim is now on a firm with less leverage). Both effects increase the value of the remaining equity. But the former creditors — now equity holders — have converted a senior, fixed-income claim into a junior, residual claim. Whether this benefits them depends on whether the reduction in the probability of default outweighs the loss of seniority.</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;line-height:2;">
          Before swap: Equity = Call(S=100, K=150, σ=40%, T=5) = $22.7M<br>
          After swap (K→100): Equity = Call(S=100, K=100, σ=40%, T=5) = $42.8M<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">Reducing debt by $50M nearly doubles equity value — the option moves from out-of-the-money to at-the-money.</span>
        </div>

        <div class="key-takeaway">
          <div class="kt-label">🎯 Chapter 30 — The Big Picture</div>
          <ul>
            <li><strong>Equity in any levered firm is a call option</strong> on the firm's assets, with the face value of debt as the strike price. In healthy firms, this observation is academic. In distressed firms, it is essential — it explains why equity trades at positive prices even when assets < debt.</li>
            <li><strong>Time and volatility create equity value in distress:</strong> Even deeply insolvent firms have positive equity value if there is sufficient time (long debt maturity) and uncertainty (high asset volatility) for assets to recover above the debt level.</li>
            <li><strong>Equity and debt interests diverge in distress:</strong> Equity holders rationally prefer more risk, more time, and more leverage — all of which transfer value from creditors. This conflict explains dividend restrictions, covenants, and the structure of bankruptcy law.</li>
            <li><strong>"Gambling for resurrection" is rational for equity, destructive for the firm:</strong> Projects that increase variance but have negative expected value can increase equity value while destroying total firm value. This is the most dangerous implication of the option framework.</li>
            <li><strong>Option pricing can value equity when DCF cannot:</strong> In deeply distressed firms, DCF says equity = 0. Option pricing gives a positive value that depends on asset value, debt level, maturity, and volatility. Sensitivity analysis on these inputs reveals what must happen for equity to be worth investing in.</li>
            <li><strong>Debt restructuring is strike price reduction:</strong> Converting debt to equity lowers K and moves the option closer to (or into) the money. This is why debt-for-equity swaps are the centerpiece of most restructurings — they reset the option parameters in favor of the reorganized firm's viability.</li>
          </ul>
        </div>
      </div>`
    ]
  }
};

// ═══════════════════════════════════════
//  RENDER SIDEBAR
// ═══════════════════════════════════════
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  html += `<div class="chapter-item" style="padding:10px 20px;opacity:0.7;" onclick="goHome()">
    <span style="font-size:14px;margin-right:6px;">🏠</span>
    <span class="chapter-title-text" style="font-size:13px;">Home — Book Overview</span>
  </div>`;

  BOOK.forEach((part, pi) => {
    html += `<div class="part-group${pi === 0 ? ' open' : ''}" data-part="${pi}">`;
    html += `<div class="part-header" onclick="togglePart(${pi})">
      <span class="arrow">▶</span>
      Part ${part.part} — ${part.partTitle}
    </div>`;
    html += `<div class="part-chapters">`;

    part.chapters.forEach(ch => {
      html += `<div class="chapter-item" data-ch="${ch.ch}" onclick="selectChapter(${ch.ch})">
        <span class="chapter-num">${ch.ch}</span>
        <span class="chapter-title-text">${ch.title}</span>
      </div>`;
      html += `<div class="section-list" data-ch-sections="${ch.ch}">`;
      ch.sections.forEach((sec, si) => {
        html += `<div class="section-item" data-ch="${ch.ch}" data-sec="${si}" onclick="selectSection(${ch.ch},${si})">${sec}</div>`;
      });
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  nav.innerHTML = html;
}

function togglePart(pi) {
  const group = document.querySelector(`.part-group[data-part="${pi}"]`);
  group.classList.toggle('open');
}

// ═══════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════
function findChapter(chNum) {
  for (const part of BOOK) {
    for (const ch of part.chapters) {
      if (ch.ch === chNum) return { part, chapter: ch };
    }
  }
  return null;
}

function goHome() {
  currentChapter = null;
  currentSection = null;
  document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active'));
  document.getElementById('breadcrumb').innerHTML = 'Home';
  renderHome();
}

function selectChapter(chNum) {
  const found = findChapter(chNum);
  if (!found) return;
  currentChapter = chNum;
  currentSection = null;
  visitedChapters.add(chNum);
  updateProgress();

  // Update sidebar active states
  document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active'));
  const chItem = document.querySelector(`.chapter-item[data-ch="${chNum}"]`);
  if (chItem) chItem.classList.add('active');

  // Open parent part
  const partGroup = chItem?.closest('.part-group');
  if (partGroup) partGroup.classList.add('open');

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML =
    `Part ${found.part.part} · <span>Ch ${chNum}: ${found.chapter.title}</span>`;

  renderChapter(found.part, found.chapter);
}

function selectSection(chNum, secIdx) {
  if (currentChapter !== chNum) selectChapter(chNum);
  currentSection = secIdx;

  document.querySelectorAll('.section-item').forEach(el => el.classList.remove('active-section'));
  const secItem = document.querySelector(`.section-item[data-ch="${chNum}"][data-sec="${secIdx}"]`);
  if (secItem) secItem.classList.add('active-section');

  // Scroll to section in content
  const secEl = document.getElementById(`sec-${chNum}-${secIdx}`);
  if (secEl) {
    secEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // Open the card
    secEl.classList.add('open');
  }
}

// ═══════════════════════════════════════
//  RENDER HOME
// ═══════════════════════════════════════
function renderHome() {
  const area = document.getElementById('contentArea');
  let html = `
    <div class="welcome-screen fade-in">
      <div class="welcome-icon">📘</div>
      <h2>Investment Valuation</h2>
      <p>Your interactive companion to Damodaran's masterwork. 34 chapters distilled into digestible, analogy-rich sections — built for learning, teaching, and quick reference.</p>
    </div>
    <div class="parts-grid">`;

  BOOK.forEach((part, i) => {
    const chRange = `Ch ${part.chapters[0].ch}–${part.chapters[part.chapters.length-1].ch}`;
    html += `
      <div class="part-card fade-in fade-in-d${Math.min(i+1,4)}" onclick="selectChapter(${part.chapters[0].ch})">
        <div class="part-label">Part ${part.part}</div>
        <h3>${part.partTitle}</h3>
        <p>${part.partDesc}</p>
        <div class="ch-count">${part.chapters.length} chapters · ${chRange}</div>
      </div>`;
  });

  html += `</div>`;
  area.innerHTML = html;
}

// ═══════════════════════════════════════
//  RENDER CHAPTER
// ═══════════════════════════════════════
function renderChapter(part, chapter) {
  const area = document.getElementById('contentArea');
  const chContent = CHAPTER_CONTENT[chapter.ch] || null;
  let html = `
    <div class="chapter-view visible fade-in">
      <div class="chapter-header">
        <div class="part-label">Part ${part.part} · ${part.partTitle}</div>
        <h2>Chapter ${chapter.ch}: ${chapter.title}</h2>
        <div class="chapter-subtitle" id="chapterSubtitle-${chapter.ch}">
          ${chContent ? `<div class="chapter-intro-text">${chContent.subtitle}</div>` : ''}
        </div>
      </div>`;

  // Analogy banner
  if (chapter.analogy) {
    html += `
      <div class="analogy-banner fade-in fade-in-d1">
        <div class="icon">💡</div>
        <div>
          <div class="label">Core Analogy</div>
          <p>${chapter.analogy}</p>
        </div>
      </div>`;
  }

  // Section cards
  chapter.sections.forEach((sec, si) => {
    const hasContent = chContent && chContent.sections[si];
    html += `
      <div class="section-card fade-in fade-in-d${Math.min(si+1,4)}" id="sec-${chapter.ch}-${si}">
        <div class="section-card-header" onclick="toggleSectionCard(this)">
          <h3>${sec}</h3>
          <span class="toggle-icon">+</span>
        </div>
        <div class="section-card-body">
          ${hasContent
            ? chContent.sections[si]
            : `<div class="placeholder-content" id="content-${chapter.ch}-${si}">Content coming soon — ask me to populate this section!</div>`
          }
        </div>
      </div>`;
  });

  // Chapter nav
  const allChs = BOOK.flatMap(p => p.chapters);
  const idx = allChs.findIndex(c => c.ch === chapter.ch);
  html += `<div style="display:flex;justify-content:space-between;margin-top:36px;padding-top:24px;border-top:1px solid var(--border);">`;
  if (idx > 0) {
    const prev = allChs[idx-1];
    html += `<button class="view-btn" onclick="selectChapter(${prev.ch})" style="text-align:left;">
      ← Ch ${prev.ch}: ${prev.title}
    </button>`;
  } else { html += `<span></span>`; }
  if (idx < allChs.length - 1) {
    const next = allChs[idx+1];
    html += `<button class="view-btn" onclick="selectChapter(${next.ch})" style="text-align:right;">
      Ch ${next.ch}: ${next.title} →
    </button>`;
  } else { html += `<span></span>`; }
  html += `</div></div>`;

  area.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleSectionCard(header) {
  const card = header.parentElement;
  card.classList.toggle('open');
}

// ═══════════════════════════════════════
//  PROGRESS
// ═══════════════════════════════════════
function updateProgress() {
  const total = BOOK.reduce((acc, p) => acc + p.chapters.length, 0);
  const done = visitedChapters.size;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;
}

// ═══════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    document.querySelectorAll('.chapter-item, .section-item, .part-group').forEach(el => el.style.display = '');
    return;
  }

  BOOK.forEach((part, pi) => {
    let partHasMatch = false;
    const partGroup = document.querySelector(`.part-group[data-part="${pi}"]`);

    part.chapters.forEach(ch => {
      const chItem = document.querySelector(`.chapter-item[data-ch="${ch.ch}"]`);
      const secList = document.querySelector(`.section-list[data-ch-sections="${ch.ch}"]`);
      const titleMatch = ch.title.toLowerCase().includes(q);
      let secMatch = false;

      ch.sections.forEach((sec, si) => {
        const secItem = document.querySelector(`.section-item[data-ch="${ch.ch}"][data-sec="${si}"]`);
        const match = sec.toLowerCase().includes(q);
        if (secItem) secItem.style.display = match ? '' : 'none';
        if (match) secMatch = true;
      });

      const visible = titleMatch || secMatch;
      if (chItem) chItem.style.display = visible ? '' : 'none';
      if (secList) secList.style.display = secMatch ? 'block' : '';
      if (visible) partHasMatch = true;
    });

    if (partGroup) {
      partGroup.style.display = partHasMatch ? '' : 'none';
      if (partHasMatch && q.length > 1) partGroup.classList.add('open');
    }
  });
});

// ═══════════════════════════════════════
//  VIEW TOGGLE & SIDEBAR
// ═══════════════════════════════════════
function setView(view) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  if (view === 'map') renderBookMap();
  else if (currentChapter) { const f = findChapter(currentChapter); if(f) renderChapter(f.part, f.chapter); }
  else renderHome();
}

function renderBookMap() {
  const area = document.getElementById('contentArea');
  let html = `<div class="fade-in" style="padding-top:20px;">
    <h2 style="font-family:'Fraunces',serif;font-size:26px;margin-bottom:8px;">Book Map</h2>
    <p style="color:var(--text-secondary);margin-bottom:32px;">All 34 chapters at a glance. Click any chapter to dive in.</p>`;

  BOOK.forEach(part => {
    html += `<div style="margin-bottom:28px;">
      <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:${part.partColor};margin-bottom:10px;">
        Part ${part.part} — ${part.partTitle}
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;">`;

    part.chapters.forEach(ch => {
      const visited = visitedChapters.has(ch.ch);
      html += `<div onclick="selectChapter(${ch.ch}); setView('content');"
        style="background:var(--warm-white);border:1px solid ${visited ? part.partColor : 'var(--border)'};
        border-radius:var(--radius-sm);padding:14px 16px;cursor:pointer;transition:all 0.2s;
        ${visited ? 'border-left:3px solid '+part.partColor : ''}"
        onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='var(--shadow-sm)'"
        onmouseout="this.style.transform='';this.style.boxShadow=''">
        <div style="font-family:'Fraunces',serif;font-size:12px;color:${part.partColor};margin-bottom:4px;">Ch ${ch.ch}</div>
        <div style="font-size:13px;font-weight:500;line-height:1.35;">${ch.title}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">${ch.sections.length} sections</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;
  area.innerHTML = html;
}

document.getElementById('menuToggle').addEventListener('click', () => {
  const sb = document.getElementById('sidebar');
  const main = document.getElementById('main');
  const overlay = document.getElementById('sidebarOverlay');
  const isMobile = window.innerWidth <= 1024;

  if (isMobile) {
    const isOpen = sb.classList.contains('mobile-open');
    sb.classList.toggle('mobile-open', !isOpen);
    overlay.classList.toggle('visible', !isOpen);
  } else {
    sb.classList.toggle('collapsed');
    if (sb.classList.contains('collapsed')) {
      main.style.marginLeft = '0';
    } else {
      main.style.marginLeft = '320px';
    }
  }
});

function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}

// Close mobile sidebar when a chapter is selected on mobile
const origSelectChapter = selectChapter;
selectChapter = function(chNum) {
  origSelectChapter(chNum);
  if (window.innerWidth <= 1024) closeMobileSidebar();
};
const origGoHome = goHome;
goHome = function() {
  origGoHome();
  if (window.innerWidth <= 1024) closeMobileSidebar();
};

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
renderSidebar();
renderHome();
</script>
</body>
</html>
