        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">1</span>
            <div>
              <strong style="font-size:14px;">Find Out What Is Expected of You</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">Don't just track analyst EPS estimates. Understand <em>why</em> investors value the firm the way they do — what competitive advantages they're pricing in, what growth rate is embedded in the stock price. Reverse-engineer the market's expectations and compare them to your internal forecasts.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">2</span>
            <div>
              <strong style="font-size:14px;">Learn to Manage Expectations — Credibly</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">When insiders believe the market is pricing in more than the firm can deliver, they should talk down expectations. But this must be done credibly — Microsoft in the 1990s developed a reputation for systematically underpromising and overdelivering, which eventually undermined the signal value of their guidance.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">3</span>
            <div>
              <strong style="font-size:14px;">Do Not Delay the Inevitable</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">When reality diverges from expectations — a key market isn't growing, a product isn't catching on — the temptation is to buy time with accounting ploys (shifting future revenue into the current quarter, capitalizing expenses). This always makes the eventual reckoning worse. Firms that delay bad news suffer larger credibility and valuation penalties when the truth emerges.</span>
            </div>
          </div>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Steve Jobs's job at Apple was far easier in 1998 (when the stock was at a 10-year low and expectations were rock-bottom) than in 2000, after he'd pushed the stock up tenfold and the market expected miracles. The irony of the expectations game: it's easier to manage a "failing" firm (low expectations) than a "winning" one (sky-high expectations).</p>
        </div>
      </div>`,

      // Section 8: The Expectations Game
      `<div class="rich-content">
        <p>As future growth becomes the largest share of value, expectations become the dominant force driving stock price reactions. This explains why young firms exhibit seemingly irrational behavior: good earnings news leading to stock drops (because expectations were higher), bad news leading to rallies (because expectations were worse).</p>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Four Lessons from the Expectations Game</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;">
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);border-top:3px solid var(--terracotta);">
            <strong style="font-size:13px;display:block;margin-bottom:4px;">⚖️ Risk Is Relative to Expectations</strong>
            <span style="font-size:12px;color:var(--text-secondary);">A firm reporting 35% earnings growth will see its stock drop if the market expected 50%. A firm reporting a 20% decline will rally if a 40% decline was priced in. Performance is always measured against the embedded expectation, not against zero.</span>
          </div>
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);border-top:3px solid var(--forest);">
            <strong style="font-size:13px;display:block;margin-bottom:4px;">🏆 Good Company ≠ Good Investment</strong>
            <span style="font-size:12px;color:var(--text-secondary);">A superbly managed company may be a poor investment if the market has already priced in perfection. Conversely, a poorly run company may be a great investment if expectations are set too low. Empirical evidence confirms that "admired" companies underperform "despised" ones as investments.</span>
          </div>
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);border-top:3px solid #7B68A8;">
            <strong style="font-size:13px;display:block;margin-bottom:4px;">📰 Small News → Big Price Moves</strong>
            <span style="font-size:12px;color:var(--text-secondary);">When most value lives in uncertain future growth, even a tiny piece of new information (a single quarter's revenue miss by 2%) can trigger a major reassessment of the entire growth trajectory — and a disproportionate stock price reaction.</span>
          </div>
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);border-top:3px solid #2A7B9B;">
            <strong style="font-size:13px;display:block;margin-bottom:4px;">🔑 Focus on Value Driver Information</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Look past the aggregate earnings headline. Revenue growth rates, unit economics, customer acquisition costs, churn rates — these are the inputs that actually change the valuation model. Track value drivers, not vanity metrics.</span>
          </div>
        </div>

        <div class="key-takeaway">
          <div class="kt-label">🎯 Chapter 23 — The Big Picture</div>
          <ul>
            <li><strong>Same principles, harder inputs:</strong> DCF still works for start-ups. The difficulty is estimation noise, not a conceptual flaw. Abandoning valuation for "new paradigm" metrics is worse, not better.</li>
            <li><strong>Seven-step framework:</strong> Update data aggressively, forecast revenues as the anchor, map a path to sustainable margins, tie reinvestment to a sales-to-capital ratio, let risk parameters converge, adjust for survival probability, and subtract options from equity value.</li>
            <li><strong>Two dominant value drivers:</strong> Compounded revenue growth and sustainable operating margin. Everything else is secondary. Terminal value dominates because all value creation lies in the future — this is a feature, not a bug.</li>
            <li><strong>Survival and dilution must be explicit:</strong> Only 31% of new businesses survive seven years (25% in tech). Optimistic base-case DCFs without a failure adjustment are fairy tales.</li>
            <li><strong>Estimation noise is real — and that's OK:</strong> Wide ranges are not a modeling failure but a reflection of genuine uncertainty. The valuation's value lies in making assumptions transparent and asking "what must be true for this price to be justified?"</li>
            <li><strong>Expectations drive everything:</strong> Markets reward or punish relative to what was priced in, not raw headline numbers. Good companies can be bad stocks, and bad companies can be good stocks.</li>
          </ul>
        </div>
      </div>`
    ]
  }
};

// ═══════════════════════════════════════
//  RENDER SIDEBAR
// ═══════════════════════════════════════
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  let html = '';
  html += `<div class="chapter-item" style="padding:10px 20px;opacity:0.7;" onclick="goHome()">
    <span style="font-size:14px;margin-right:6px;">🏠</span>
    <span class="chapter-title-text" style="font-size:13px;">Home — Book Overview</span>
  </div>`;

  BOOK.forEach((part, pi) => {
    html += `<div class="part-group${pi === 0 ? ' open' : ''}" data-part="${pi}">`;
    html += `<div class="part-header" onclick="togglePart(${pi})">
      <span class="arrow">▶</span>
      Part ${part.part} — ${part.partTitle}
    </div>`;
    html += `<div class="part-chapters">`;

    part.chapters.forEach(ch => {
      html += `<div class="chapter-item" data-ch="${ch.ch}" onclick="selectChapter(${ch.ch})">
        <span class="chapter-num">${ch.ch}</span>
        <span class="chapter-title-text">${ch.title}</span>
      </div>`;
      html += `<div class="section-list" data-ch-sections="${ch.ch}">`;
      ch.sections.forEach((sec, si) => {
        html += `<div class="section-item" data-ch="${ch.ch}" data-sec="${si}" onclick="selectSection(${ch.ch},${si})">${sec}</div>`;
      });
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  nav.innerHTML = html;
}

function togglePart(pi) {
  const group = document.querySelector(`.part-group[data-part="${pi}"]`);
  group.classList.toggle('open');
}

// ═══════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════
function findChapter(chNum) {
  for (const part of BOOK) {
    for (const ch of part.chapters) {
      if (ch.ch === chNum) return { part, chapter: ch };
    }
  }
  return null;
}

function goHome() {
  currentChapter = null;
  currentSection = null;
  document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active'));
  document.getElementById('breadcrumb').innerHTML = 'Home';
  renderHome();
}

function selectChapter(chNum) {
  const found = findChapter(chNum);
  if (!found) return;
  currentChapter = chNum;
  currentSection = null;
  visitedChapters.add(chNum);
  updateProgress();

  // Update sidebar active states
  document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active'));
  const chItem = document.querySelector(`.chapter-item[data-ch="${chNum}"]`);
  if (chItem) chItem.classList.add('active');

  // Open parent part
  const partGroup = chItem?.closest('.part-group');
  if (partGroup) partGroup.classList.add('open');

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML =
    `Part ${found.part.part} · <span>Ch ${chNum}: ${found.chapter.title}</span>`;

  renderChapter(found.part, found.chapter);
}

function selectSection(chNum, secIdx) {
  if (currentChapter !== chNum) selectChapter(chNum);
  currentSection = secIdx;

  document.querySelectorAll('.section-item').forEach(el => el.classList.remove('active-section'));
  const secItem = document.querySelector(`.section-item[data-ch="${chNum}"][data-sec="${secIdx}"]`);
  if (secItem) secItem.classList.add('active-section');

  // Scroll to section in content
  const secEl = document.getElementById(`sec-${chNum}-${secIdx}`);
  if (secEl) {
    secEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // Open the card
    secEl.classList.add('open');
  }
}

// ═══════════════════════════════════════
//  RENDER HOME
// ═══════════════════════════════════════
function renderHome() {
  const area = document.getElementById('contentArea');
  let html = `
    <div class="welcome-screen fade-in">
      <div class="welcome-icon">📘</div>
      <h2>Investment Valuation</h2>
      <p>Your interactive companion to Damodaran's masterwork. 34 chapters distilled into digestible, analogy-rich sections — built for learning, teaching, and quick reference.</p>
    </div>
    <div class="parts-grid">`;

  BOOK.forEach((part, i) => {
    const chRange = `Ch ${part.chapters[0].ch}–${part.chapters[part.chapters.length-1].ch}`;
    html += `
      <div class="part-card fade-in fade-in-d${Math.min(i+1,4)}" onclick="selectChapter(${part.chapters[0].ch})">
        <div class="part-label">Part ${part.part}</div>
        <h3>${part.partTitle}</h3>
        <p>${part.partDesc}</p>
        <div class="ch-count">${part.chapters.length} chapters · ${chRange}</div>
      </div>`;
  });

  html += `</div>`;
  area.innerHTML = html;
}

// ═══════════════════════════════════════
//  RENDER CHAPTER
// ═══════════════════════════════════════
function renderChapter(part, chapter) {
  const area = document.getElementById('contentArea');
  const chContent = CHAPTER_CONTENT[chapter.ch] || null;
  let html = `
    <div class="chapter-view visible fade-in">
      <div class="chapter-header">
        <div class="part-label">Part ${part.part} · ${part.partTitle}</div>
        <h2>Chapter ${chapter.ch}: ${chapter.title}</h2>
        <div class="chapter-subtitle" id="chapterSubtitle-${chapter.ch}">
          ${chContent ? `<div class="chapter-intro-text">${chContent.subtitle}</div>` : ''}
        </div>
      </div>`;

  // Analogy banner
  if (chapter.analogy) {
    html += `
      <div class="analogy-banner fade-in fade-in-d1">
        <div class="icon">💡</div>
        <div>
          <div class="label">Core Analogy</div>
          <p>${chapter.analogy}</p>
        </div>
      </div>`;
  }

  // Section cards
  chapter.sections.forEach((sec, si) => {
    const hasContent = chContent && chContent.sections[si];
    html += `
      <div class="section-card fade-in fade-in-d${Math.min(si+1,4)}" id="sec-${chapter.ch}-${si}">
        <div class="section-card-header" onclick="toggleSectionCard(this)">
          <h3>${sec}</h3>
          <span class="toggle-icon">+</span>
        </div>
        <div class="section-card-body">
          ${hasContent
            ? chContent.sections[si]
            : `<div class="placeholder-content" id="content-${chapter.ch}-${si}">Content coming soon — ask me to populate this section!</div>`
          }
        </div>
      </div>`;
  });

  // Chapter nav
  const allChs = BOOK.flatMap(p => p.chapters);
  const idx = allChs.findIndex(c => c.ch === chapter.ch);
  html += `<div style="display:flex;justify-content:space-between;margin-top:36px;padding-top:24px;border-top:1px solid var(--border);">`;
  if (idx > 0) {
    const prev = allChs[idx-1];
    html += `<button class="view-btn" onclick="selectChapter(${prev.ch})" style="text-align:left;">
      ← Ch ${prev.ch}: ${prev.title}
    </button>`;
  } else { html += `<span></span>`; }
  if (idx < allChs.length - 1) {
    const next = allChs[idx+1];
    html += `<button class="view-btn" onclick="selectChapter(${next.ch})" style="text-align:right;">
      Ch ${next.ch}: ${next.title} →
    </button>`;
  } else { html += `<span></span>`; }
  html += `</div></div>`;

  area.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleSectionCard(header) {
  const card = header.parentElement;
  card.classList.toggle('open');
}

// ═══════════════════════════════════════
//  PROGRESS
// ═══════════════════════════════════════
function updateProgress() {
  const total = BOOK.reduce((acc, p) => acc + p.chapters.length, 0);
  const done = visitedChapters.size;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;
}

// ═══════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    document.querySelectorAll('.chapter-item, .section-item, .part-group').forEach(el => el.style.display = '');
    return;
  }

  BOOK.forEach((part, pi) => {
    let partHasMatch = false;
    const partGroup = document.querySelector(`.part-group[data-part="${pi}"]`);

    part.chapters.forEach(ch => {
      const chItem = document.querySelector(`.chapter-item[data-ch="${ch.ch}"]`);
      const secList = document.querySelector(`.section-list[data-ch-sections="${ch.ch}"]`);
      const titleMatch = ch.title.toLowerCase().includes(q);
      let secMatch = false;

      ch.sections.forEach((sec, si) => {
        const secItem = document.querySelector(`.section-item[data-ch="${ch.ch}"][data-sec="${si}"]`);
        const match = sec.toLowerCase().includes(q);
        if (secItem) secItem.style.display = match ? '' : 'none';
        if (match) secMatch = true;
      });

      const visible = titleMatch || secMatch;
      if (chItem) chItem.style.display = visible ? '' : 'none';
      if (secList) secList.style.display = secMatch ? 'block' : '';
      if (visible) partHasMatch = true;
    });

    if (partGroup) {
      partGroup.style.display = partHasMatch ? '' : 'none';
      if (partHasMatch && q.length > 1) partGroup.classList.add('open');
    }
  });
});

// ═══════════════════════════════════════
//  VIEW TOGGLE & SIDEBAR
// ═══════════════════════════════════════
function setView(view) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  if (view === 'map') renderBookMap();
  else if (currentChapter) { const f = findChapter(currentChapter); if(f) renderChapter(f.part, f.chapter); }
  else renderHome();
}

function renderBookMap() {
  const area = document.getElementById('contentArea');
  let html = `<div class="fade-in" style="padding-top:20px;">
    <h2 style="font-family:'Fraunces',serif;font-size:26px;margin-bottom:8px;">Book Map</h2>
    <p style="color:var(--text-secondary);margin-bottom:32px;">All 34 chapters at a glance. Click any chapter to dive in.</p>`;

  BOOK.forEach(part => {
    html += `<div style="margin-bottom:28px;">
      <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:${part.partColor};margin-bottom:10px;">
        Part ${part.part} — ${part.partTitle}
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;">`;

    part.chapters.forEach(ch => {
      const visited = visitedChapters.has(ch.ch);
      html += `<div onclick="selectChapter(${ch.ch}); setView('content');"
        style="background:var(--warm-white);border:1px solid ${visited ? part.partColor : 'var(--border)'};
        border-radius:var(--radius-sm);padding:14px 16px;cursor:pointer;transition:all 0.2s;
        ${visited ? 'border-left:3px solid '+part.partColor : ''}"
        onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='var(--shadow-sm)'"
        onmouseout="this.style.transform='';this.style.boxShadow=''">
        <div style="font-family:'Fraunces',serif;font-size:12px;color:${part.partColor};margin-bottom:4px;">Ch ${ch.ch}</div>
        <div style="font-size:13px;font-weight:500;line-height:1.35;">${ch.title}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">${ch.sections.length} sections</div>
      </div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;
  area.innerHTML = html;
}

document.getElementById('menuToggle').addEventListener('click', () => {
  const sb = document.getElementById('sidebar');
  const main = document.getElementById('main');
  const overlay = document.getElementById('sidebarOverlay');
  const isMobile = window.innerWidth <= 1024;

  if (isMobile) {
    const isOpen = sb.classList.contains('mobile-open');
    sb.classList.toggle('mobile-open', !isOpen);
    overlay.classList.toggle('visible', !isOpen);
  } else {
    sb.classList.toggle('collapsed');
    if (sb.classList.contains('collapsed')) {
      main.style.marginLeft = '0';
    } else {
      main.style.marginLeft = '320px';
    }
  }
});

function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}

// Close mobile sidebar when a chapter is selected on mobile
const origSelectChapter = selectChapter;
selectChapter = function(chNum) {
  origSelectChapter(chNum);
  if (window.innerWidth <= 1024) closeMobileSidebar();
};
const origGoHome = goHome;
goHome = function() {
  origGoHome();
  if (window.innerWidth <= 1024) closeMobileSidebar();
};

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
renderSidebar();
renderHome();
</script>
</body>
</html>
