      // Section 12: Evidence on Insiders and Investment Professionals

  7: {
    subtitle: "Every valuation model needs a foundation: a risk-free rate, an equity risk premium, and default spreads for debt. Getting these 'simple' inputs wrong can torpedo an otherwise brilliant analysis. This chapter shows how to estimate each one — and where the landmines are.",
    sections: [
      // Section 0: The Risk-Free Rate
      `<div class="rich-content">
        <p>The risk-free rate is the <strong>starting point</strong> for every expected return calculation. It sounds simple — "just use the government bond rate" — but the details matter more than most analysts realize.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>The risk-free rate is like <strong>sea level</strong> for a mountain climber. Every peak (expected return) is measured as altitude above it. If your sea level is wrong, every altitude reading is wrong too — even if you measured the climb perfectly. A 1% error in the risk-free rate cascades through the entire valuation.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Two Conditions for "Risk-Free"</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;border-left:3px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;">No Default Risk</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Only government securities qualify (since governments print money). Even this breaks down in emerging markets where governments <em>do</em> default on local currency debt.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;border-left:3px solid var(--forest);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;">No Reinvestment Risk</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">The asset's duration must match the cash flow horizon. A 6-month T-bill is NOT risk-free for a 10-year valuation — you don't know what rate you'll reinvest at in 6 months. Ideally, use zero-coupon government bonds matching each cash flow period.</p>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">The Consistency Principle</p>
        <p>The risk-free rate must match the currency and inflation basis of your cash flows:</p>
        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:16px;">💵</span><span style="font-size:13px;color:var(--text-secondary);"><strong>Cash flows in USD?</strong> → Use U.S. Treasury bond rate</span>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:16px;">🇧🇷</span><span style="font-size:13px;color:var(--text-secondary);"><strong>Cash flows in BRL?</strong> → Use Brazilian government bond rate (adjusted for default risk)</span>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:8px 0;">
            <span style="font-size:16px;">📊</span><span style="font-size:13px;color:var(--text-secondary);"><strong>Real (inflation-adjusted) cash flows?</strong> → Use inflation-indexed bond rate (TIPs)</span>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">When the Government Isn't Default-Free</p>
        <p>In emerging markets, four approaches to estimate the local risk-free rate:</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;">
          <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:12.5px;display:block;margin-bottom:4px;">🏦 Subtract Default Spread</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Take the local govt bond rate and subtract the default spread implied by the sovereign rating or CDS.</span>
          </div>
          <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:12.5px;display:block;margin-bottom:4px;">🔨 Build-Up</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Expected local inflation + real risk-free rate (from TIPs or global estimate).</span>
          </div>
          <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:12.5px;display:block;margin-bottom:4px;">📈 Derivatives Market</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Back out from forward exchange rates using interest rate parity.</span>
          </div>
          <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:12.5px;display:block;margin-bottom:4px;">🔄 Inflation Conversion</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Start from a mature-market risk-free rate and adjust for differential inflation.</span>
          </div>
        </div>
      </div>`,

      // Section 1: Equity Risk Premium
      `<div class="rich-content">
        <p>The ERP is the <strong>most debated number in finance</strong>. It's the extra return investors demand for holding stocks over risk-free bonds. Small changes have enormous valuation impact — yet practitioners use premiums ranging from 3% to 12%, often without justification.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>The equity risk premium is the <strong>price of fear</strong>. How much extra do investors demand to ride the roller coaster of stocks instead of sitting in the safety of government bonds? When fear is high (2008 crisis), the premium spikes. When fear is low (dot-com peak), it shrinks. Getting it wrong is like miscalibrating the altimeter on every mountain you climb.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Approach 1: Historical Premium</p>
        <p>The standard approach: look at how much stocks earned over bonds in the past. Simple — but three choices create wildly different numbers:</p>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">⏳</span><span class="myth-title">Three Sources of Disagreement</span></div>
          <div class="myth-body">
            <p><strong>1. Time period:</strong> 1928–2010? Last 50 years? Last 20? Longer = more data = lower standard error, but assumes risk aversion hasn't changed. Shorter = more "current" but statistically noisy. With 20% annual std dev in stocks, a 25-year estimate has a standard error of ~4% — almost as large as the premium itself!</p>
            <p><strong>2. T-bills vs. T-bonds:</strong> Since the yield curve is usually upward-sloping, stocks-over-bills gives a higher premium than stocks-over-bonds. Match the security to your risk-free rate choice — if you use T-bonds for Rf, use stocks-over-bonds for the premium.</p>
            <p><strong>3. Arithmetic vs. geometric average:</strong> Arithmetic = simple mean of annual returns (higher). Geometric = compounded return (lower). Damodaran prefers geometric for long-term valuation because stock returns are negatively correlated over time (arithmetic overstates).</p>
          </div>
          <div class="myth-verdict">
            <span class="verdict-icon">📊</span>
            <span class="verdict-text"><strong>Damodaran's choice:</strong> Geometric average, stocks over T-bonds, 1928–2010 = ~4.31%. His reasoning: long period (reduces noise), T-bonds (matches valuation practice), geometric (matches long-term compounding).</span>
          </div>
        </div>

      // Section 1: Reinvestment Needs
      `<div class="rich-content">

          <p>Growth is like muscle gain. You don't get bigger by wishing — you need to eat (reinvest) and train efficiently (earn good returns on capital). A bodybuilder who eats a lot but trains poorly (high reinvestment, low ROC) gains fat, not muscle. One who trains brilliantly on little food (low reinvestment, high ROC) gets lean gains. The formula is: <strong>Growth = How much you eat × How efficiently you convert food to muscle</strong>.</p>

            <strong style="font-size:13.5px;color:var(--terracotta);">EPS Growth (Equity)</strong>
            <div style="font-family:'JetBrains Mono',monospace;font-size:12px;margin:8px 0;padding:8px;background:var(--warm-white);border-radius:6px;text-align:center;">
              g_EPS = Retention Ratio × Return on Equity
            </div>
            <p style="font-size:12.5px;color:var(--text-secondary);margin:0;">How much earnings the firm keeps (retention) × how well it invests those earnings (ROE). Used in dividend discount models.</p>

            <div style="font-family:'JetBrains Mono',monospace;font-size:12px;margin:8px 0;padding:8px;background:var(--warm-white);border-radius:6px;text-align:center;">

          </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">The Second Growth Effect: Changing Returns</p>
        <p>If the return on capital itself is changing (improving or deteriorating), there's a <strong>bonus (or penalty) growth term</strong>. A firm improving ROC from 10% to 11% with a 40% reinvestment rate gets:</p>
        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin:14px 0;font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center;line-height:2;">
          g = Reinvestment Rate × ROC + Δ ROC / ROC_prior<br>
          g = 40% × 11% + (11% − 10%) / 10% = 4.4% + 10% = 14.4%
        </div>
        <p>This is why turnaround firms can show explosive growth on modest reinvestment — the improvement in efficiency acts as a multiplier.</p>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">For Money-Losing Firms: Revenue-Based Growth</p>
        <p>When earnings are negative, you can't use ROC × reinvestment. Instead, project <strong>revenue growth</strong> first, then overlay improving margins toward an industry-average target. Use the <strong>sales-to-capital ratio</strong> to link revenue growth to reinvestment needs. Tesla (2011): project revenues growing from $117M to $5B+ over 10 years, margins improving from −70% to +10%, and check that the implied return on capital converges to industry norms.</p>
      </div>`,

      // Section 4: Qualitative Aspects of Growth
      `<div class="rich-content">
        <p>Analysts often invoke qualitative factors — "great management," "strong brand," "first-mover advantage" — as reasons for high growth. Damodaran's response: <strong>every qualitative factor must show up in the quantitative inputs, or it doesn't affect value</strong>.</p>

        <div style="margin:14px 0;">

            <span style="font-size:18px;">👔</span>

            <span style="font-size:18px;">⚔️</span>

        <div class="sub-analogy">

  12: {
    subtitle: "You can't forecast cash flows forever — at some point you need a terminal value. This chapter shows the three ways to estimate it (liquidation, multiples, stable growth perpetuity), explains how to calibrate the stable growth inputs, and confronts the uncomfortable question: what if the firm doesn't survive?",
    sections: [
      // Section 0: Closure in Valuation
      `<div class="rich-content">
        <p>Terminal value is where most of the value in a DCF lives — and where most of the mistakes happen. For a typical high-growth company, <strong>60–80% of total value comes from the terminal value</strong>. Getting it wrong is like writing a brilliant novel but botching the ending.</p>

          <p>A DCF is like a two-part movie deal. Part 1 is the detailed script you've written (the explicit forecast period — 5 to 10 years of projected cash flows). Part 2 is "and then they lived happily ever after" (the terminal value — everything beyond the forecast). Part 2 is vaguer, but it's often worth more than Part 1. If you don't get the "ever after" right, the whole deal falls apart.</p>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Three Approaches to Terminal Value</p>

            <div class="myth-header"><span class="myth-icon">♾️</span><span class="myth-title">3. Stable Growth Perpetuity (Preferred)</span></div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 10px;color:var(--text-primary);">Constraints on the Stable Growth Rate</p>
        <p>The growth rate in perpetuity cannot exceed the growth rate of the economy. This is a hard ceiling, not a suggestion. Three factors determine where the ceiling sits:</p>

            <span style="font-size:16px;">🌍</span><span style="font-size:13px;color:var(--text-secondary);"><strong>Domestic vs. multinational?</strong> A purely domestic firm is capped at the domestic economy's growth. A multinational can use global GDP growth.</span>

      // Section 1: The Survival Issue
      `<div class="rich-content">
        <p>Every terminal value assumes the firm survives to reach stable growth. But what if it doesn't? Young firms, especially in volatile industries, face a real probability of failure — going bankrupt, running out of cash, or being acquired at fire-sale prices.</p>

        <p>A firm with $1B in cash and EBITDA of −$1.5B will burn through its reserves in 8 months. When markets close (as they did in 2001 and 2008), firms with short cash runways are in existential danger.</p>

      // Section 2: Closing Thoughts on Terminal Value

        <p>Terminal value is where discipline matters most, because the numbers are so sensitive to small changes. Damodaran offers several guardrails to keep your estimates honest.</p>

        <div class="myth-card">

  13: {
    subtitle: "The dividend discount model is the oldest and most intuitive valuation approach: a stock is worth the present value of all future dividends. This chapter walks through the general model, its practical versions (Gordon Growth, two-stage, three-stage), the pitfalls of using it, and the empirical evidence on whether it works.",
    sections: [
      // Section 0: The General Model
      `<div class="rich-content">
        <p>The DDM rests on a beautifully simple premise: <strong>if you buy a stock and hold it forever, the only cash you ever receive is dividends</strong>. Therefore, the stock's value is the present value of all future dividends, stretching to infinity.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>The DDM values a stock the way you'd value an <strong>apple tree</strong>. You don't eat the tree (you don't liquidate the company) — you eat the apples it produces each season (dividends). The tree's value is the present value of all the apples it will ever produce, discounted back to today. A tree that produces more apples, sooner, with more certainty, is worth more.</p>
        </div>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;line-height:2;">

          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">DPS = expected dividends per share, Ke = cost of equity</span>
        </div>

        <p>This is the foundation on which all equity valuation models are built. The FCFE model (Chapter 14) and firm valuation models (Chapter 15) are extensions, not replacements. Even if a firm pays no dividends today, the DDM framework still applies — you're just assuming dividends will start eventually, or that the firm will return cash in other ways.</p>

        <div class="key-takeaway">
          <div class="kt-label">🎯 When to Use the DDM</div>

          </ul>

      // Section 1: Versions of the Model
      `<div class="rich-content">
        <p>The infinite-sum formula is elegant but impractical. To make it usable, we need assumptions about how dividends grow over time. This gives rise to three standard versions:</p>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">1️⃣</span><span class="myth-title">Gordon Growth Model (Stable Growth DDM)</span></div>
          <div class="myth-body">
            <p>The simplest and most famous version. Assume dividends grow at a <strong>constant rate forever</strong>:</p>
            <div style="font-family:'JetBrains Mono',monospace;font-size:12.5px;margin:10px 0;padding:10px;background:var(--warm-white);border-radius:6px;text-align:center;line-height:2;">
              Value = DPS₁ / (Ke − g)<br>
              <span style="font-family:'Source Sans 3',sans-serif;font-size:11.5px;color:var(--text-muted);">DPS₁ = next year's dividend, Ke = cost of equity, g = perpetual growth rate</span>
            </div>
            <p><strong>Best for:</strong> Mature firms growing at or below the economy's growth rate — utilities, large banks, consumer staples. The growth rate must be less than the cost of equity, and the payout ratio should be consistent with the growth rate (Payout = 1 − g/ROE).</p>
          </div>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>The Gordon Growth Model is like valuing a rental property where rent goes up by 2% per year forever. If the rent next year is $12,000 and your required return is 8%, the property is worth $12,000 / (8% − 2%) = $200,000. Simple, clean — and only works if 2% is a sustainable growth rate for rent.</p>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">2️⃣</span><span class="myth-title">Two-Stage DDM</span></div>
          <div class="myth-body">
            <p>High growth for a defined period, then an abrupt drop to stable growth forever. You explicitly forecast dividends during the high-growth phase, then compute a terminal value using the Gordon model.</p>

              <span style="font-family:'Source Sans 3',sans-serif;font-size:11.5px;color:var(--text-muted);">P_n = DPS_{n+1} / (Ke_stable − g_stable) = terminal price</span>

        </div>

            <p><strong>Best for:</strong> Firms with very high current growth rates where an abrupt drop would be unrealistic (e.g., Amgen, fast-growing consumer companies). All inputs — beta, ROE, payout ratio, debt ratio — should converge gradually during the transition.</p>

      // Section 2: Issues in Using the Dividend Discount Model
      `<div class="rich-content">

      `<div class="rich-content">
        <p>The core question: <strong>how much cash could a firm pay its shareholders</strong> if it wanted to? The answer is Free Cash Flow to Equity — net income, minus what needs to be reinvested, plus what can be funded with new debt.</p>

      // Section 1: FCFE Valuation Models
      `<div class="rich-content">

      // Section 2: FCFE Valuation versus Dividend Discount Model Valuation
      `<div class="rich-content">

          <p>If FCFE is the <strong>owner's take-home pay</strong> after paying the mortgage, FCFF is the <strong>total rental income from the property</strong> before any mortgage payments. FCFF lets you value the entire property first, then figure out how much belongs to the bank (debt) and how much to the owner (equity).</p>
        </div>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:12.5px;text-align:center;line-height:2.2;">
          FCFF = EBIT(1 − t) + Depreciation − CapEx − Δ Working Capital<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">= After-tax operating income − Net reinvestment</span>
        </div>

        <p>Key difference from FCFE: no debt payments, no new debt issued. This makes FCFF independent of financing decisions — it measures pure operating performance.</p>

        <div class="key-takeaway">
          <div class="kt-label">🎯 When to Use Firm Valuation over Equity Valuation</div>
          <ul>
            <li>Leverage is very high, very low, or changing significantly over time</li>
            <li>You want to separate the operating value question from the financing question</li>
            <li>Estimating future debt payments and issuances would be messy (they always are for highly levered firms)</li>
          </ul>
        </div>
      </div>`,

      // Section 1: Firm Valuation: The Cost of Capital Approach
      `<div class="rich-content">
        <p>The workhorse approach: discount FCFF at the WACC. The tax benefit of debt is baked into the discount rate (after-tax cost of debt), and the resulting value is for the <strong>entire firm</strong>.</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:12.5px;text-align:center;line-height:2.2;">
          Firm Value = Σ [FCFF_t / (1 + WACC)^t] + Terminal Value / (1 + WACC)^n<br>
          Equity Value = Firm Value − Market Value of Debt + Cash
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>The WACC approach is like appraising a <strong>whole bakery</strong>. You estimate all future profits from baking (FCFF), discount them at a blended rate that reflects both the baker's required return (equity) and the bank's interest rate (debt), and get the total bakery value. Then you subtract the outstanding loan to see what the baker's stake is worth.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Worked Examples from the Book</p>
        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:18px;">🏬</span>
            <div><strong style="font-size:13.5px;">Target (operating leases)</strong> — Capitalizing leases as debt changed the debt ratio from 31% to 35%, the ROC from 11.4% to 10.8%, and the value per share from $59.50 to $58.97. Small impact here, but grows with lease intensity.</div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:18px;">💊</span>
            <div><strong style="font-size:13.5px;">Amgen (R&D capitalization)</strong> — Capitalizing R&D changed value per share from $48.24 to $67.17. The effect was positive because Amgen's R&D had been productive — past expenses were generating current income at high returns.</div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">
            <span style="font-size:18px;">🏭</span>
            <div><strong style="font-size:13.5px;">Gerdau Steel (emerging market)</strong> — Valued in USD with country risk via lambda, then converted to BRL. Both currency paths converged to nearly identical values — proving that currency choice is irrelevant if done consistently.</div>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">🔄</span><span class="myth-title">The Circular Reasoning Problem</span></div>
          <div class="myth-body">You need market value weights for WACC, but you're trying to <em>estimate</em> the market value. The fix: use current market values, compute value, then iterate — plug your estimated value back into the weights, recompute WACC, revalue. Values converge quickly (usually 2–3 iterations). In practice, the difference is small if the firm is roughly fairly priced.</div>
        </div>
      </div>`,

      // Section 2: Firm Valuation: The Adjusted Present Value Approach
      `<div class="rich-content">
        <p>APV takes a different route to the same destination. Instead of embedding the tax benefits of debt in the discount rate (WACC), it values them <strong>separately</strong>:</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:12.5px;text-align:center;line-height:2.2;">
          Firm Value = Unlevered Firm Value<br>
          &nbsp;&nbsp;+ PV of Tax Shields from Debt<br>
          &nbsp;&nbsp;− Expected Bankruptcy Costs
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>If the WACC approach values the bakery in one go (blending everything into one discount rate), APV is like an <strong>itemized appraisal</strong>. First, value the bakery as if it had no loan at all (pure operating value). Then add the tax savings from the loan (a government subsidy for borrowing). Then subtract the risk that the loan could force the bakery into bankruptcy. Three pieces, separately valued, added up.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">The Three Steps</p>
        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:18px;color:var(--terracotta);font-weight:700;min-width:26px;">1</span>
            <div><strong style="font-size:14px;">Value the unlevered firm</strong><br><span style="font-size:13px;color:var(--text-secondary);">Discount FCFF at the <em>unlevered</em> cost of equity (cost of equity if the firm had zero debt). This isolates pure operating value.</span></div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:18px;color:var(--terracotta);font-weight:700;min-width:26px;">2</span>
            <div><strong style="font-size:14px;">Add the PV of tax shields</strong><br><span style="font-size:13px;color:var(--text-secondary);">Tax shield = Interest × Tax Rate. If debt is permanent, PV = Debt × Tax Rate. If debt is being repaid, discount each year's tax saving at the pretax cost of debt.</span></div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;">
            <span style="font-family:'Fraunces',serif;font-size:18px;color:var(--terracotta);font-weight:700;min-width:26px;">3</span>
            <div><strong style="font-size:14px;">Subtract expected bankruptcy costs</strong><br><span style="font-size:13px;color:var(--text-secondary);">= Probability of default × Cost of bankruptcy (typically 25–30% of firm value). Use bond ratings to estimate default probability from historical tables.</span></div>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">⚠️</span><span class="myth-title">APV Without Bankruptcy Costs = Dangerous</span></div>
          <div class="myth-body">Many practitioners use APV but skip bankruptcy costs, treating debt as a pure benefit. This makes firm value increase monotonically with leverage, and the "optimal" debt ratio becomes 100% — which is absurd. <strong>Never use APV without estimating bankruptcy costs.</strong></div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">WACC vs. APV: When to Use Which</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;border-top:3px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;">WACC Approach</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Better for ongoing firms with stable or slowly changing debt ratios. Easier to work with debt as a % of value. The default in most valuations.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;border-top:3px solid var(--forest);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;">APV Approach</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Better for LBOs, project finance, and transactions with known dollar-debt schedules. More transparent about where value comes from. Preferred in private equity circles.</p>
          </div>
        </div>
      </div>`,

      // Section 3: Effect of Leverage on Firm Value
      `<div class="rich-content">
        <p>Since both WACC and APV make value a function of leverage, there must be some debt level that <strong>maximizes firm value</strong>. Finding it is the optimal capital structure problem.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Leverage is like seasoning in cooking. A little salt (debt) enhances the flavor (value) through the tax benefit. But too much ruins the dish — bankruptcy costs overwhelm the tax savings. The optimal capital structure is the <strong>perfect amount of seasoning</strong>: enough to enhance, not enough to destroy.</p>
        </div>

        <p>Using the WACC approach, the optimal debt ratio is where <strong>WACC is minimized</strong> (and therefore firm value is maximized). The key trade-off:</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;">
          <div style="background:rgba(45,95,74,0.06);border:1px solid rgba(45,95,74,0.15);border-radius:var(--radius-sm);padding:16px;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--forest);">✅ Benefits of Debt</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Tax deductibility of interest lowers the effective cost of debt. More debt → lower WACC (up to a point).</p>
          </div>
          <div style="background:rgba(196,101,46,0.06);border:1px solid rgba(196,101,46,0.15);border-radius:var(--radius-sm);padding:16px;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--terracotta);">❌ Costs of Debt</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">More debt → higher default risk → higher cost of debt AND higher beta → eventually WACC rises. Indirect bankruptcy costs (lost customers, suppliers) amplify the damage.</p>
          </div>
        </div>

        <p>Disney's optimal debt ratio was ~40% (vs. 27% actual in 2009), potentially creating $1.76 billion in additional value through a share buyback funded by new debt.</p>
      </div>`,

      // Section 4: Adjusted Present Value and Financial Leverage
      `<div class="rich-content">
        <p>The APV approach provides an alternative route to optimal capital structure. Instead of minimizing WACC, you <strong>maximize the levered firm value</strong> by finding the debt level where the tax shields minus bankruptcy costs are greatest.</p>

        <p>The two approaches give similar but not identical answers, for three reasons:</p>
        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:16px;">1️⃣</span><span style="font-size:13px;color:var(--text-secondary);">APV handles indirect bankruptcy costs more explicitly — WACC may understate them if they're not fully reflected in the cost of debt.</span>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:16px;">2️⃣</span><span style="font-size:13px;color:var(--text-secondary);">APV works with dollar debt (current borrowing), while WACC works with a debt ratio (implying future borrowing as the firm grows).</span>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:8px 0;">
            <span style="font-size:16px;">3️⃣</span><span style="font-size:13px;color:var(--text-secondary);">The discount rate for tax savings differs — APV typically uses pretax cost of debt, while WACC embeds the savings at the cost of capital.</span>
          </div>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>WACC and APV are like two hiking trails up the same mountain. The WACC trail is well-paved and popular (works with debt ratios, one discount rate, easy to implement). The APV trail is rougher but offers better views (you can see each component — operating value, tax shield, bankruptcy cost — separately). For most hikes, take the paved trail. For leveraged buyouts and complex debt structures, take the scenic route.</p>
        </div>

        <div class="key-takeaway">
          <div class="kt-label">🎯 Chapter 15 — The Big Picture</div>
          <ul>
            <li><strong>FCFF is pre-debt.</strong> It measures the cash flow to all investors, independent of financing. Discount at WACC (cost of capital approach) or at the unlevered cost of equity (APV approach).</li>
            <li><strong>WACC approach:</strong> Tax benefit lives in the discount rate. Practical, widely used, best for ongoing firms with stable leverage. Requires market-value weights (iterate if needed).</li>
            <li><strong>APV approach:</strong> Separates unlevered value + tax shields − bankruptcy costs. More transparent, best for LBOs and transactions with known debt schedules. Never skip bankruptcy costs.</li>
            <li><strong>Firm → Equity:</strong> Firm Value + Cash − Debt = Equity Value. Then divide by shares outstanding. All Chapter 9–10 adjustments (R&D, leases, NOLs) flow through here.</li>
            <li><strong>Optimal leverage:</strong> Where WACC is minimized (or levered firm value is maximized). Tax benefits of debt vs. bankruptcy costs. The sweet spot varies by firm — stable cash flow firms can handle more debt than volatile ones.</li>
            <li><strong>FCFF vs. FCFE should give the same equity value</strong> if assumptions are consistent — but in practice, getting them to agree requires matching leverage assumptions perfectly.</li>
          </ul>
        </div>
      </div>`
    ]
  },
  16: {
    subtitle: "You've valued the firm's operating assets. Now comes the 'last mile': adding cash and non-operating assets, subtracting debt and other claims, adjusting for employee options, and handling voting-right differences — to arrive at the number that actually matters: value per share.",
    sections: [
      // Section 0: Value of Nonoperating Assets
      `<div class="rich-content">
        <p>The value of a firm's operating assets (from DCF) is not the same as firm value. You need to add back assets that were <strong>excluded from the operating valuation</strong> because they don't generate operating cash flows — but they're still worth something.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>You've appraised a restaurant based on its food revenue and costs (operating assets). But the owner also has $500K in a savings account, a $2M condo above the restaurant, and a 30% stake in a rival pizzeria. These are <strong>non-operating assets</strong> — they have value, but their income wasn't in your operating cash flow projections. You need to add them back.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Key Non-Operating Assets</p>

        <div style="margin:14px 0;">
          <div class="myth-card">
            <div class="myth-header"><span class="myth-icon">💵</span><span class="myth-title">Cash and Marketable Securities</span></div>
            <div class="myth-body">
              <p>Generally added at face value. But three situations warrant a <strong>discount</strong>:</p>
              <p><strong>1. Below-market returns:</strong> Cash earning 1% when the risk-free rate is 4% is worth less than face value.</p>
              <p><strong>2. Management distrust:</strong> If management has a track record of wasting cash on bad acquisitions, the market may discount the cash (probability of waste × expected loss).</p>
              <p><strong>3. Trapped cash:</strong> Cash held in foreign subsidiaries to avoid repatriation taxes. Discount by the expected tax hit (e.g., $20B × 20% tax = only $16B in value). Cisco had $20B+ in trapped cash in 2011.</p>
              <p><strong>Critical warning:</strong> Never discount cash at the cost of equity. A $1B cash balance earning the risk-free rate, discounted at 11%, looks like it's worth $800M — but that's just a discount-rate mismatch, not a real reduction in value.</p>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;">
            <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
              <strong style="font-size:12.5px;display:block;margin-bottom:4px;">📊 Cross-Holdings in Other Firms</strong>
              <span style="font-size:12px;color:var(--text-secondary);">Minority passive (<20%): use market value if traded. Minority active (20–50%): equity method on books — adjust to market. Majority (>50%): consolidated — subtract minority interest from firm value.</span>
            </div>
            <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
              <strong style="font-size:12.5px;display:block;margin-bottom:4px;">🏗️ Other Non-Operating Assets</strong>
              <span style="font-size:12px;color:var(--text-secondary);">Undeveloped land, unused patents, overfunded pension plans. These have value but generate no operating cash flow. Estimate market value separately and add.</span>
            </div>
          </div>
        </div>
      </div>`,

      // Section 1: Firm Value and Equity Value
      `<div class="rich-content">
        <p>The bridge from firm value to equity value requires subtracting everything that <em>isn't</em> equity — all non-equity claims on the firm's assets.</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:12.5px;text-align:center;line-height:2.2;">
          Equity Value = Value of Operating Assets<br>
          &nbsp;&nbsp;+ Cash & Non-Operating Assets<br>
          &nbsp;&nbsp;− Debt (at market value)<br>
          &nbsp;&nbsp;− Minority Interests<br>
          &nbsp;&nbsp;− Preferred Stock<br>
          &nbsp;&nbsp;− Other Non-Equity Claims
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Going from firm value to equity value is like <strong>dividing a pizza</strong> — but before you count slices for the owners, you remove the slices promised to the bank (debt), the silent partner (minority interests), and the preferred investors (preferred stock). What's left is common equity. Then you divide by the number of people at the table (shares outstanding).</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Key Subtraction Items</p>
        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:18px;">🏦</span>
            <div><strong style="font-size:13.5px;">Debt</strong> — Use <em>market value</em>, not book value. If the firm has bonds trading at 80 cents on the dollar, use 80%, not 100%. For non-traded debt, estimate market value by treating all debt as one coupon bond and discounting at the current cost of debt.</div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:18px;">👥</span>
            <div><strong style="font-size:13.5px;">Minority Interests</strong> — When you consolidate a subsidiary (>50% ownership), 100% of its cash flows are in your FCFF. But some of the equity belongs to other investors. Subtract their share at market value (or estimated value using a P/B multiple).</div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">
            <span style="font-size:18px;">⭐</span>
            <div><strong style="font-size:13.5px;">Preferred Stock</strong> — A hybrid between debt and equity. Value as a perpetuity: Market Value = Preferred Dividend / Cost of Preferred Stock. Subtract from firm value before computing common equity.</div>
          </div>
        </div>
      </div>`,

      // Section 2: Management and Employee Options
      `<div class="rich-content">
        <p>This is where many valuations go wrong. When a firm has granted stock options to employees and managers, those options represent a <strong>claim on the equity that dilutes existing shareholders</strong>. Ignoring them overstates value per share — sometimes dramatically.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Imagine you're splitting a $100 cake among 10 people — that's $10 each. But 2 more people hold "cake coupons" (options) that let them claim slices if the cake is big enough. If you ignore the coupons, you tell each of the 10 people they get $10. In reality, they might get only $8.33 because the coupon holders will show up. <strong>Options are claims on equity — they must be subtracted before dividing by shares.</strong></p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Three Approaches to Handling Options</p>

        <div style="margin:14px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;border-left:3px solid var(--terracotta);">
            <strong style="font-size:13.5px;color:var(--terracotta);">1. Fully Diluted Shares (Crude)</strong>
            <p style="font-size:12.5px;color:var(--text-secondary);margin:4px 0 0;">Add all option shares to the share count and divide equity value by the total. Problems: treats deep-in-the-money and barely-in-the-money options as equivalent, ignores the exercise price (which brings cash into the firm), and overstates dilution for out-of-the-money options.</p>
          </div>

          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;border-left:3px solid var(--forest);">
            <strong style="font-size:13.5px;color:var(--forest);">2. Treasury Stock Method (Better)</strong>
            <p style="font-size:12.5px;color:var(--text-secondary);margin:4px 0 0;">Assume in-the-money options are exercised, the firm collects the exercise price, and uses the proceeds to buy back shares at the current price. Net new shares = options exercised − shares repurchased. Better than fully diluted, but still ignores the time value of options.</p>
          </div>

          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;border-left:3px solid #7B68A8;">
            <strong style="font-size:13.5px;color:#7B68A8;">3. Option Pricing Model (Best — Damodaran's Preferred)</strong>
            <p style="font-size:12.5px;color:var(--text-secondary);margin:4px 0 0;">Value the options using Black-Scholes (or a modified version for employee options that accounts for vesting, forfeiture, and early exercise). <strong>Subtract the total option value from equity value</strong>, then divide by shares outstanding (not diluted shares). This is the cleanest approach — it properly values the option claim and removes it from equity before dividing.</p>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">📊</span><span class="myth-title">The Option Overhang Can Be Massive</span></div>
          <div class="myth-body">At tech companies, employee options can represent 10–20% of the total equity value. Ignoring them — or using the crude fully-diluted method — can produce value-per-share errors of 15–25%. This is not a rounding error; it's a valuation-grade mistake.</div>
        </div>
      </div>`,

      // Section 3: Value per Share When Voting Rights Vary
      `<div class="rich-content">
        <p>Some companies have multiple share classes with different voting rights — Class A with 10 votes per share and Class B with 1 vote, for example (Google, Facebook, Berkshire Hathaway). If both classes have the same dividend rights, should they trade at the same price?</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Two first-class airline tickets on the same flight. One includes access to the captain's lounge (voting rights), the other doesn't. The flight experience is identical (same dividends). Should they cost the same? In theory, yes — unless access to the captain's lounge gives you the power to change the route (corporate decisions) in ways that affect the flight's value.</p>
        </div>

        <p>In practice, <strong>voting shares trade at a premium</strong> over non-voting shares. The premium is driven by:</p>
        <div style="margin:14px 0;">

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Advantages and Pitfalls</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;">
          <div style="background:rgba(45,95,74,0.06);border:1px solid rgba(45,95,74,0.15);border-radius:var(--radius-sm);padding:18px;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:10px;color:var(--forest);">✅ Why Analysts Use It</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.6;margin:0 0 6px;">Stable and intuitive benchmark for investors who mistrust DCF estimates. Reasonably consistent accounting standards across firms. Available when earnings are negative. Median U.S. P/B in Jan 2011: 1.79 (average: 4.59 — heavily skewed by outliers).</p>
          </div>
          <div style="background:rgba(196,101,46,0.06);border:1px solid rgba(196,101,46,0.15);border-radius:var(--radius-sm);padding:18px;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:10px;color:var(--terracotta);">❌ Where It Misleads</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.6;margin:0 0 6px;">Book value is an accounting construct: shaped by depreciation rules, acquisition goodwill, R&D capitalization, and buybacks. Service/tech firms with few tangible assets have low book values that may not reflect economic capital. Cross-country comparisons are distorted by different accounting standards. Buybacks mechanically inflate P/B.</p>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">The Core Insight: P/B = f(ROE Spread)</p>

        <p>From the DDM, Damodaran derives the P/B formula for a stable-growth firm. The result is remarkably clean and shows that the entire multiple reduces to one question: <em>does this firm earn more or less than its cost of equity?</em></p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;line-height:2.2;">
          P/B = (ROE − g) / (Ke − g)<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">If ROE = Ke → P/B = 1 (market price = book value). If ROE > Ke → P/B > 1. If ROE < Ke → P/B < 1.</span><br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">Vodafone (2010): ROE = 8.77%, Ke = 9%, g = 3.88% → P/B = 0.96 — should trade slightly below book</span>
        </div>

        <p>For high-growth firms, the formula extends to a two-stage model, but the fundamentals remain the same: ROE, payout, growth, and cost of equity. The return on equity has the biggest impact by far — it is the <strong>companion variable</strong> for P/B.</p>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">📘</span><span class="myth-title">"Below Book Means Cheap" — Not Necessarily</span></div>
          <div class="myth-body">
            A stock trading below book can be undervalued, but it can also be <em>fairly</em> priced if the firm earns poor returns on equity. When ROE drops from 25% to 12% with Ke at 11.5%, P/B falls from 7.89 to 1.25 — a dramatic but justified decline. The right benchmark is not "book = fair value"; it is whether <strong>ROE exceeds cost of equity</strong>.
          </div>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Book value is like the historical construction cost of a factory, while market value is what buyers believe the factory can earn going forward. A modernized plant earning 25% ROC and an obsolete plant earning 5% ROC can have identical book values but very different economic values. The spread between what they earn and what investors require is what separates a premium from a discount.</p>
        </div>
      </div>`,

      // Section 1: Applications of Price–Book Value Ratios
      `<div class="rich-content">
        <p>P/B can be applied at three levels — market, sector, and individual firm. At every level, the logic is the same: P/B reflects the equity return spread (ROE − Ke), and useful analysis comes from finding mismatches between the observed P/B and the expected spread.</p>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:18px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">
            <span style="font-size:20px;">🌍</span>
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin:8px 0 6px;color:var(--forest);">Market-Level</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.55;margin:0;">S&P 500 P/B rose from ~1.3 in 1980 to ~5 in 2000, partly explained by rising aggregate ROE. The 2008 crisis collapsed both P/B and ROE. A "high P/B market" may be justified by stronger profitability and lower required returns — or it may signal overvaluation if ROE is mean-reverting.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <span style="font-size:20px;">🏭</span>
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin:8px 0 6px;color:var(--terracotta);">Sector Comparisons</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.55;margin:0;">Plot P/B against ROE for all firms in a sector. Firms below the regression line are potentially undervalued; above it, potentially overvalued. Oil companies (Sept 2000): P/B regressed on ROE (R² ≈ 0.40). Giant Industries: actual P/B = 0.54, predicted = 1.80 — most undervalued. Harken Energy: actual = 0.64, predicted = 0.24 — most overvalued.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid #2A7B9B;">
            <span style="font-size:20px;">📊</span>
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin:8px 0 6px;color:#2A7B9B;">Market-Wide Regression</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.55;margin:0;">Regress P/B on ROE, beta, payout, and growth for all firms (R² ≈ 43% for U.S. in Jan 2011). The strong positive ROE coefficient persists globally — Europe, Japan, and emerging markets all show it. Coca-Cola (Jan 2011): predicted P/B = 4.82 vs. actual 4.83 — fairly valued.</p>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">The Mismatch Matrix</p>

        <p>The most powerful application of P/B analysis is the mismatch matrix — plotting P/B against the equity return spread (ROE − Ke) and hunting for outliers in the off-diagonal quadrants.</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin:16px 0;">
          <div style="padding:16px;background:rgba(45,95,74,0.08);border-radius:var(--radius-sm) 0 0 0;border:1px solid rgba(45,95,74,0.15);">
            <strong style="font-size:13px;color:var(--forest);">🟢 Low P/B + High ROE</strong>
            <p style="font-size:12px;color:var(--text-secondary);margin:6px 0 0;">Potentially <strong>undervalued</strong>. The firm earns well above its cost of equity, but the market is not reflecting it in price. Most attractive quadrant for value investors.</p>
          </div>
          <div style="padding:16px;background:rgba(45,95,74,0.04);border-radius:0 var(--radius-sm) 0 0;border:1px solid var(--border);">
            <strong style="font-size:13px;color:var(--text-secondary);">⚪ High P/B + High ROE</strong>
            <p style="font-size:12px;color:var(--text-secondary);margin:6px 0 0;">Consistent. Premium pricing matches premium returns. The key risk: how sustainable is the ROE? Porter's Five Forces (barriers to entry, substitutes, supplier/buyer power, rivalry) determine how long excess returns persist.</p>
          </div>
          <div style="padding:16px;background:rgba(196,101,46,0.04);border-radius:0 0 0 var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:13px;color:var(--text-secondary);">⚪ Low P/B + Low ROE</strong>
            <p style="font-size:12px;color:var(--text-secondary);margin:6px 0 0;">Consistent. Weak returns justify a discount to book. Only interesting if ROE is expected to improve (turnaround candidates). IBM in 1992: P/B ≈ 1, ROE negative — but by 1999, P/B reached 9× as ROE recovered under Gerstner.</p>
          </div>
          <div style="padding:16px;background:rgba(196,101,46,0.08);border-radius:0 0 var(--radius-sm) 0;border:1px solid rgba(196,101,46,0.15);">
            <strong style="font-size:13px;color:var(--terracotta);">🔴 High P/B + Low ROE</strong>
            <p style="font-size:12px;color:var(--text-secondary);margin:6px 0 0;">Potentially <strong>overvalued</strong>. The market is paying a premium for returns that do not justify it. Either growth expectations are unrealistic, or there is a structural mismatch between pricing and fundamentals.</p>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">🧠</span><span class="myth-title">Current ROE vs. Expected ROE</span></div>
          <div class="myth-body">
            The market prices <strong>expected future ROE</strong>, not current ROE. If competition is intensifying, today's 30% ROE may converge toward 15% quickly, and the "high P/B" is justified by the <em>current</em> ROE but not the future one. Two fixes: <strong>(1)</strong> use the average ROE over 3-5 years instead of one-year ROE; <strong>(2)</strong> push the firm's current ROE toward the industry average, weighting by the speed of expected convergence.
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Tracking Restructurings: The IBM Case</p>

        <p>Damodaran uses IBM as the classic illustration of how P/B and ROE move together over time. In 1983, IBM traded at 3× book with a 25% ROE. By 1992, ROE had turned negative and P/B collapsed to ~1×. Under Lou Gerstner, the firm pivoted to services, ROE recovered, and P/B reached 9× by 1999. Even after the dot-com crash, IBM maintained high ROE and high P/B from 2001-2010. The lesson: successful restructurings migrate firms from the bottom-left quadrant (low P/B, low ROE) to the top-right (high P/B, high ROE).</p>
      </div>`,

      // Section 2: Use in Investment Strategies
      `<div class="rich-content">
        <p>Low P/B screens are central to classic value investing — Benjamin Graham listed "price less than two-thirds of book value" as one of his stock-picking criteria. Multiple empirical studies confirm that low P/B portfolios earn excess returns, but the <em>interpretation</em> of those returns is contested.</p>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">The Evidence: Global Excess Returns</p>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Two Competing Interpretations</p>

          <div style="background:rgba(45,95,74,0.06);border:1px solid rgba(45,95,74,0.15);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--forest);">📈 Mispricing View</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Markets systematically underprice "ugly" balance-sheet stories. Investors overreact to short-term bad news and anchor too heavily on recent poor performance. Low P/B stocks are genuinely undervalued, and the excess returns are alpha.</p>

          <div style="background:rgba(196,101,46,0.06);border:1px solid rgba(196,101,46,0.15);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--terracotta);">⚠️ Risk View (Fama & French)</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Low P/B is a proxy for equity risk — these firms are more distressed, more levered, or more exposed to economic downturns. Higher returns are fair compensation for this additional risk, not mispricing. Book-to-market is a risk factor, not an anomaly.</p>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">🎯</span><span class="myth-title">Better Screen Design: Low P/B + High ROE</span></div>
          <div class="myth-body">

        </div>
      </div>`,

      // Section 3: Value-to-Book Ratios
      `<div class="rich-content">
        <p><strong>Value-to-Book</strong> is the firm-value analog of P/B. Instead of equity vs. book equity, it compares total firm value (or enterprise value) to book capital. The companion variable shifts from ROE to <strong>ROC (Return on Capital)</strong>, and the required return shifts from cost of equity to <strong>WACC</strong>.</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;line-height:2.2;">
          Value/Book Capital = (Market Value of Debt + Equity) / Book Capital<br>
          EV/Invested Capital = Enterprise Value / (Book Capital − Cash)<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">Stable growth: V/B = (ROC − g) / (WACC − g). If ROC = WACC → V/B = 1.</span>
        </div>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin:18px 0;">
          <div style="font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;">Equity vs. Firm-Level Book Value Multiples</div>
          <div style="display:grid;grid-template-columns:1.5fr 1.5fr 1.5fr 1.5fr;gap:2px;font-size:12px;">
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:var(--radius-sm) 0 0 0;">Feature</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;">P/B (Equity)</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;">V/B (Firm)</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:0 var(--radius-sm) 0 0;">EV/IC (Enterprise)</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Numerator</div>
            <div style="padding:8px 10px;background:var(--warm-white);">Market cap</div>
            <div style="padding:8px 10px;background:var(--warm-white);">Mkt Debt + Mkt Equity</div>
            <div style="padding:8px 10px;background:var(--warm-white);">Enterprise Value</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Denominator</div>
            <div style="padding:8px 10px;background:var(--cream);">Book Equity</div>
