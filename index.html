          <div style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px;">The reserve has negative NPV today, but the 20-year lease and high oil price volatility create $97M in option value. The firm should hold the lease, not develop — and not abandon.</div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Implications for Natural Resource Companies</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;">
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:18px;">📈</span>
            <strong style="font-size:13px;display:block;margin:4px 0 4px;">Reserve Rich Firms Trade at Premiums</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Firms with large undeveloped reserves often trade above their DCF values. The "excess" is the option value of the reserves — the market is pricing in the flexibility to develop when commodity prices are favorable.</span>
          </div>
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:18px;">🎢</span>
            <strong style="font-size:13px;display:block;margin:4px 0 4px;">Volatile Commodity = More Valuable Reserves</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Counter-intuitively, reserves in volatile commodity markets (oil) are worth more as options than reserves in stable markets. Volatility is the enemy of static NPV but the friend of option value.</span>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">⚠️</span><span class="myth-title">Beware of Double-Counting</span></div>
          <div class="myth-body">
            A common error is to value an oil firm's reserves using option pricing <em>and</em> add the DCF value of the same reserves separately. The option value already includes the DCF component (as the intrinsic value of the option). The correct approach: value producing reserves using DCF, value undeveloped reserves using option pricing, and sum them. Never double-count.
          </div>
        </div>
      </div>`,

      // Section 3: Other Applications
      `<div class="rich-content">
        <p>Damodaran extends the delay option framework to several other domains where <strong>exclusive rights + uncertainty + time</strong> combine to create option value that static analysis misses.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Every exclusive right with a time limit is a call option in disguise. A spectrum license is an option to build a telecom network. A movie script option is an option to produce a film. A land lease is an option to build. The economics are identical — what changes is the "underlying asset" and the "strike price."</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Applications Beyond Natural Resources and Patents</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--terracotta);">📡 Spectrum Licenses</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">A wireless spectrum license gives the holder the exclusive right to build a network in a geographic area. The investment cost (K) is the network build-out; the underlying (S) is the present value of subscriber revenues. The license period is T. The huge premiums paid for spectrum in government auctions reflect option value, not just static DCF.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--forest);">🏗️ Undeveloped Land</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">A vacant lot with building permits is an option on a completed structure. K = construction cost; S = value of completed building; T = permit expiry. In hot real estate markets, vacant land trades at premiums to the "static" residual land value (completed value minus construction cost) because the option to wait for even higher prices adds value.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid #7B68A8;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:#7B68A8;">🎬 Entertainment Options</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">A movie studio that buys an "option" on a book or screenplay has the right to produce the movie (invest K in production) if conditions are favorable (the genre is hot, the target audience is growing). The option price (what they pay the author) is small relative to the production cost, but it preserves the flexibility to invest only when the odds are right.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid #2A7B9B;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:#2A7B9B;">🔬 R&D as a Portfolio of Options</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Corporate R&D spending creates future options — each research project may yield a patentable product, a new technology, or an entry into a new market. The firm pays the "option premium" (R&D expense) today for the right to commercialize later. This explains why R&D-intensive firms often trade above DCF — the market is pricing the option portfolio.</p>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">When Does the Option to Delay Add the Most Value?</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin:18px 0;">
          <div style="font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;">Option Value Drivers — Summary</div>
          <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:2px;font-size:12px;">
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:var(--radius-sm) 0 0 0;">Factor</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;text-align:center;">Effect on Option Value</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:0 var(--radius-sm) 0 0;text-align:center;">Effect on Static NPV</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Higher uncertainty (σ)</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;color:var(--forest);font-weight:600;">↑ Increases</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;color:var(--terracotta);font-weight:600;">↓ Decreases</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Longer time to expiry (T)</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;color:var(--forest);font-weight:600;">↑ Increases</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;color:var(--text-muted);">Neutral</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">More exclusive rights</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;color:var(--forest);font-weight:600;">↑ Increases</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;color:var(--text-muted);">Neutral</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Lower cost of delay (y)</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;color:var(--forest);font-weight:600;">↑ Increases</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;color:var(--text-muted);">Neutral</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Higher interest rates</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;color:var(--forest);font-weight:600;">↑ Increases</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;color:var(--terracotta);font-weight:600;">↓ Decreases</div>
          </div>
        </div>

        <div class="key-takeaway">
          <div class="kt-label">🎯 Chapter 28 — The Big Picture</div>
          <ul>
            <li><strong>The option to delay is the right to wait for better information.</strong> It transforms capital budgeting from a binary accept/reject decision into a richer framework that captures the value of flexibility. Projects with negative NPV today may have substantial option value.</li>
            <li><strong>Three conditions must hold:</strong> (1) the investment right must be exclusive (patent, license, ownership), (2) the future must be uncertain, and (3) time must remain before the right expires. Without exclusivity, delay just invites competitors.</li>
            <li><strong>The delay option is a call option:</strong> S = PV of project cash flows, K = investment cost, T = duration of exclusive right, σ = uncertainty of project value, y = cost of delay (cash flows foregone by waiting).</li>
            <li><strong>Patents are the cleanest example:</strong> A pharmaceutical patent is an option to develop a drug. The holder can wait for clinical trial results, market shifts, or regulatory changes before committing the full development cost.</li>
            <li><strong>Natural resources illustrate the reversal:</strong> Higher commodity price volatility <em>increases</em> option value (more upside scenarios offset by the right not to develop in downside scenarios). This is the opposite of static NPV, where uncertainty reduces value.</li>
            <li><strong>Avoid double-counting:</strong> Option value already includes intrinsic (NPV) value. Value producing assets with DCF and undeveloped/optional assets with option pricing — never both for the same asset.</li>
            <li><strong>The framework extends broadly:</strong> Spectrum licenses, undeveloped land, movie options, and R&D portfolios all exhibit the same economics: exclusive right + uncertainty + time = option value.</li>
          </ul>
        </div>
      </div>`
    ]
  },

  29: {
    subtitle: "Beyond the option to delay, firms hold two other embedded options that DCF systematically ignores: the option to expand into new markets if an initial investment succeeds, and the option to abandon a project and recover salvage value if it fails. Together, these options explain why firms rationally invest in negative-NPV 'test' projects and why liquidation value sets a floor under equity.",
    sections: [
      // Section 0: The Option to Expand
      `<div class="rich-content">
        <p>Some investments are not valuable in themselves but create the <strong>right to make follow-on investments</strong> that could be enormously profitable. A firm that enters a new market with a small pilot project is not just buying the cash flows from that project — it is buying an <strong>option to expand</strong> if the pilot succeeds. This option value is invisible to static NPV but can dominate the total value of the investment.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>The expansion option is like building a restaurant with extra land next door. The empty lot costs money to buy and maintain, and by itself it generates nothing. But if the restaurant takes off, that land becomes priceless — it's the site for your second (and larger) location. The lot's value is not in its current use but in the option it gives you to expand.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">How It Works</p>

        <p>The initial investment creates a <strong>call option on the expansion</strong>. The option's inputs map directly to the standard framework:</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin:16px 0;">
          <div style="font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;">Expansion Option ↔ Call Option Mapping</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;font-size:12px;">
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:var(--radius-sm) 0 0 0;">Parameter</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;text-align:center;">Call Option</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:0 var(--radius-sm) 0 0;text-align:center;">Option to Expand</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Premium paid</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Option price</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Cost of initial investment (the "test")</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Underlying (S)</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Stock price</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">PV of expansion cash flows</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Strike price (K)</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Exercise price</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Cost of full-scale expansion</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Expiration (T)</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Option maturity</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Window to expand before competition</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Volatility (σ)</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Stock volatility</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Uncertainty of expansion market</div>
          </div>
        </div>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;line-height:2;">
          Total Value of Project = NPV of initial project + Option to Expand<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">A negative-NPV pilot can be rational if the expansion option it creates is valuable enough.</span>
        </div>

        <div class="myth-card">
          <div class="myth-header">
            <span class="myth-icon">🧠</span>
            <span class="myth-title">Strategic Investments Make Sense — Sometimes</span>
          </div>
          <div class="myth-body">
            Companies frequently justify negative-NPV investments as "strategic" — opening in a new country, entering an adjacent market, building a technology platform. Damodaran agrees these can be rational <em>if</em> the expansion option is genuine: the initial investment must give the firm an exclusive or near-exclusive right to expand, the expansion market must be uncertain (so the option has value), and there must be a limited window of opportunity. But "strategic" used as a blanket excuse for value-destroying investments is managerial self-deception.
          </div>
          <div class="myth-verdict">
            <span class="verdict-icon">✅</span>
            <span class="verdict-text"><strong>Test:</strong> If you can't identify the specific expansion opportunity, estimate its value, and explain why only this firm can capture it, the "strategic" label is empty.</span>
          </div>
        </div>
      </div>`,

      // Section 1: When Are Expansion Options Valuable?
      `<div class="rich-content">
        <p>Not every investment creates a valuable expansion option. Damodaran identifies the conditions that make expansion options genuinely valuable versus merely theoretical — a critical distinction because managers love to claim option value for pet projects.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>An expansion option is like a seed. Not every seed grows into a tree. You need fertile soil (an attractive market), sunlight (competitive advantage), water (management capability), and a fence (barriers to entry that keep competitors out). Without all four, the seed just sits in the ground.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Four Conditions for Valuable Expansion Options</p>

        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">1</span>
            <div>
              <strong style="font-size:14px;">Competitive Advantage from the Initial Investment</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">The pilot project must give the firm something competitors can't easily replicate — brand recognition in the new market, proprietary data, regulatory approval, a distribution network, or first-mover advantage. If anyone can enter the expansion market, there's no exclusive option.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">2</span>
            <div>
              <strong style="font-size:14px;">Sustainable Barriers to Entry</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">The expansion market must have barriers that protect the firm's option. If the market is freely accessible to all, the firm's "expansion option" has no exclusivity — and an option that anyone can exercise is worthless. Patents, regulatory moats, network effects, and scale economies create real barriers.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">3</span>
            <div>
              <strong style="font-size:14px;">Significant Uncertainty in the Expansion Market</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">Options are most valuable when the future is uncertain. If the expansion market's size and profitability are already well-known, there's nothing to "wait and learn" about — the option value is low. The pilot project is most valuable when it generates information that reduces uncertainty about whether to expand.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">4</span>
            <div>
              <strong style="font-size:14px;">The Expansion Must Be Proportionally Large</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">The option to expand is only valuable if the expansion opportunity is meaningfully larger than the initial investment. A $100M pilot that creates the option to invest $2B in a high-growth market is very different from a $100M pilot that opens the door to a $120M follow-on. Scale matters.</span>
            </div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;">
          <div style="background:rgba(45,95,74,0.06);border:1px solid rgba(45,95,74,0.15);border-radius:var(--radius-sm);padding:16px;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--forest);">✅ Genuine Expansion Option</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Disney enters Shanghai with a theme park. The initial investment creates brand recognition, government relationships, and operational knowledge that gives Disney a near-exclusive option to expand into broader Chinese entertainment (more parks, resorts, media). The market is huge, uncertain, and Disney has barriers competitors can't easily replicate.</p>
          </div>
          <div style="background:rgba(196,101,46,0.06);border:1px solid rgba(196,101,46,0.15);border-radius:var(--radius-sm);padding:16px;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--terracotta);">🔴 Fake "Strategic" Investment</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">A commodity producer enters a new geography with no cost advantage, no brand, no regulatory moat, and a market that 20 competitors can also enter. The "expansion option" is claimed but illusory — there is no exclusivity and no barrier to entry. This is empire-building disguised as strategy.</p>
          </div>
        </div>
      </div>`,

      // Section 2: Valuing a Firm with the Option to Expand
      `<div class="rich-content">
        <p>The most powerful application of the expansion option is in <strong>explaining why certain firms trade at premiums to DCF</strong>. Damodaran argues that many high-multiple firms — tech platforms, biotech, firms with strong brands — trade above their DCF values precisely because the market is pricing in expansion options that DCF cannot capture.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Valuing Amazon in 2002 with DCF would give you the online bookstore. The market was also pricing in the option to expand into cloud computing, streaming, logistics, grocery, and advertising — none of which was in the DCF model. The "premium" over DCF was the expansion option portfolio. In hindsight, the market was right.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">The Two-Component Valuation</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;line-height:2;">
          Firm Value = DCF of Existing Business + Σ Option Values of Expansion Opportunities<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">The option component can be 20–80% of total value for high-growth firms with multiple expansion paths.</span>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0;">
          <div style="text-align:center;padding:14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);border-top:3px solid var(--terracotta);">
            <div style="font-size:20px;margin-bottom:6px;">🏛️</div>
            <div style="font-size:12.5px;font-weight:600;color:var(--text-primary);">Mature Firm</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Most value from existing assets. Small or no expansion options. DCF captures nearly all value. Trades near DCF.</div>
          </div>
          <div style="text-align:center;padding:14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);border-top:3px solid var(--amber);">
            <div style="font-size:20px;margin-bottom:6px;">📈</div>
            <div style="font-size:12.5px;font-weight:600;color:var(--text-primary);">Growth Firm</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Significant value from expansion options. DCF captures only part of value. Trades above DCF. P/E looks "expensive."</div>
          </div>
          <div style="text-align:center;padding:14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);border-top:3px solid var(--forest);">
            <div style="font-size:20px;margin-bottom:6px;">🚀</div>
            <div style="font-size:12.5px;font-weight:600;color:var(--text-primary);">Platform Firm</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Most value is option value. Multiple large expansion paths. DCF captures a small fraction. Appears "wildly overvalued" on P/E.</div>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">⚠️</span><span class="myth-title">The Bubble Risk</span></div>
          <div class="myth-body">
            The expansion option framework explains premium valuations — but it can also justify <em>any</em> price if used recklessly. During the dot-com bubble, every tech firm was described as a "platform" with infinite expansion options. The market priced in options that never materialized. Damodaran's warning: expansion options must be valued with the same discipline as any other option — specific inputs, specific assumptions, testable predictions. Vague appeals to "optionality" without quantification are not valuation; they're marketing.
          </div>
          <div class="myth-verdict">
            <span class="verdict-icon">🔴</span>
            <span class="verdict-text"><strong>Discipline check:</strong> What specific market will the firm expand into? What gives it exclusivity? What's the investment required? What's the uncertainty? If you can't answer these, the "option" is imaginary.</span>
          </div>
        </div>
      </div>`,

      // Section 3: Value of Financial Flexibility
      `<div class="rich-content">
        <p>Damodaran introduces a subtler form of option value: <strong>financial flexibility</strong> — the firm's ability to respond to unexpected opportunities or threats because it maintains excess debt capacity, cash reserves, or untapped credit lines. A firm with financial flexibility holds an option on future investments whose nature is not yet known.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Financial flexibility is like keeping an empty room in your house. Right now it costs money (lost rental income). But if your aging parent needs to move in, or your teenager wants a music studio, or a pandemic forces you to work from home — that empty room becomes invaluable. The "cost" of the empty room is the premium you pay for the option to adapt.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">When Is Financial Flexibility Most Valuable?</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;">
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:18px;">📊</span>
            <strong style="font-size:13px;display:block;margin:4px 0 4px;">Volatile Investment Environment</strong>
            <span style="font-size:12px;color:var(--text-secondary);">When attractive projects appear unpredictably — acquisitions, technology shifts, market dislocations — having cash on hand or unused borrowing capacity lets you act when rivals can't. Industries with cyclical M&A opportunities (energy, banking) benefit most.</span>
          </div>
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:18px;">🏗️</span>
            <strong style="font-size:13px;display:block;margin:4px 0 4px;">Capital-Constrained Markets</strong>
            <span style="font-size:12px;color:var(--text-secondary);">When access to external capital is expensive or unreliable (during credit crunches, for small firms, in emerging markets), internal financial flexibility is disproportionately valuable. Firms that maintained liquidity during 2008–2009 could acquire distressed assets at fire-sale prices.</span>
          </div>
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:18px;">🔬</span>
            <strong style="font-size:13px;display:block;margin:4px 0 4px;">R&D-Intensive Firms</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Firms whose future opportunities depend on unpredictable research breakthroughs need dry powder to commercialize when a discovery hits. Biotech and tech firms rationally hold more cash than DCF models suggest is "optimal."</span>
          </div>
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:18px;">⚖️</span>
            <strong style="font-size:13px;display:block;margin:4px 0 4px;">Low Flexibility = High</strong>
            <span style="font-size:12px;color:var(--text-secondary);">The less flexible a firm's operations (long product cycles, heavy fixed costs, regulated industries), the more valuable financial flexibility becomes. If you can't adjust operations quickly, you need the financial ability to adapt.</span>
          </div>
        </div>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;line-height:2;">
          Value of Flexibility = Option Value of Maintaining Excess Capacity − Cost of Excess Capacity<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">Cost = lower return on cash, or interest savings foregone by not optimizing the capital structure.</span>
        </div>

        <p>Damodaran notes the paradox: traditional corporate finance theory says firms should minimize cash holdings and optimize their debt ratios. Option theory suggests that maintaining "slack" — excess cash, unused debt capacity — has genuine option value. The firms that look the most "inefficient" on a static balance sheet may be the best-positioned to capture future opportunities.</p>
      </div>`,

      // Section 4: The Option to Abandon
      `<div class="rich-content">
        <p>The mirror image of the expansion option is the <strong>option to abandon</strong>: the right to stop a failing project and recover the salvage or liquidation value of the assets. This option is a <strong>put option</strong> on the project — it sets a floor on losses and makes the initial investment less risky than a static NPV analysis assumes.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>The option to abandon is like a return policy. When you buy a jacket with a 30-day return guarantee, you're buying the jacket <em>plus</em> a put option — the right to "sell" it back to the store at the purchase price if you don't like it. A $200 jacket with a return policy is worth more to you than a $200 jacket without one. Projects with salvage value work the same way.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Framing Abandonment as a Put Option</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin:16px 0;">
          <div style="font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;">Abandonment Option ↔ Put Option Mapping</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;font-size:12px;">
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:var(--radius-sm) 0 0 0;">Parameter</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;text-align:center;">Put Option</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:0 var(--radius-sm) 0 0;text-align:center;">Option to Abandon</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Underlying (S)</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Stock price</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">PV of project's remaining cash flows</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Strike price (K)</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Exercise price</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Liquidation / salvage value</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Expiration (T)</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Option maturity</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Remaining project life</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Volatility (σ)</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Stock volatility</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Uncertainty of project cash flows</div>
          </div>
        </div>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:16px 0;font-family:'JetBrains Mono',monospace;font-size:13px;text-align:center;line-height:2;">
          Project Value = Max (PV of remaining cash flows, Salvage Value)<br>
          Value with Abandonment Option = Static NPV + Put Option Value<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12px;color:var(--text-muted);font-style:italic;">The put option sets a floor: losses cannot exceed (Investment − Salvage Value).</span>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">When Is the Abandonment Option Most Valuable?</p>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0;">
          <div style="text-align:center;padding:14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);border-top:3px solid var(--terracotta);">
            <div style="font-size:20px;margin-bottom:6px;">🏭</div>
            <div style="font-size:12.5px;font-weight:600;color:var(--text-primary);">High Salvage Value</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Assets that can be redeployed or sold easily (aircraft, ships, standard equipment) create higher put option value than specialized assets with no secondary market.</div>
          </div>
          <div style="text-align:center;padding:14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);border-top:3px solid var(--forest);">
            <div style="font-size:20px;margin-bottom:6px;">📊</div>
            <div style="font-size:12.5px;font-weight:600;color:var(--text-primary);">High Cash Flow Uncertainty</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Projects with volatile outcomes benefit more from the abandonment floor. If the project will definitely succeed, the option to abandon is worthless — you'd never exercise it.</div>
          </div>
          <div style="text-align:center;padding:14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);border-top:3px solid #2A7B9B;">
            <div style="font-size:20px;margin-bottom:6px;">⏳</div>
            <div style="font-size:12.5px;font-weight:600;color:var(--text-primary);">Long Project Life</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Longer projects have more time for things to go wrong — making the option to cut losses at any point more valuable. A 20-year project has more abandonment option value than a 2-year project.</div>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header"><span class="myth-icon">🧠</span><span class="myth-title">Airlines and the Abandonment Option</span></div>
          <div class="myth-body">
            Airlines illustrate both sides. Aircraft have a well-functioning secondary market — a used 737 can be sold or leased to dozens of other carriers worldwide. This high salvage value creates a substantial abandonment option that makes airline route investments less risky than they appear. By contrast, a firm that builds a custom chemical plant with no alternative use has almost no abandonment option — if the project fails, the assets are worthless.
          </div>
          <div class="myth-verdict">
            <span class="verdict-icon">✅</span>
            <span class="verdict-text"><strong>Practical rule:</strong> When choosing between projects with similar NPVs, prefer the one with higher salvage value. The abandonment option is free insurance built into the project's structure.</span>
          </div>
        </div>
      </div>`,

      // Section 5: Reconciling Net Present Value and Real Option Valuations
      `<div class="rich-content">
        <p>The chapter concludes with Damodaran's effort to reconcile two seemingly contradictory frameworks: <strong>static NPV</strong> (which ignores flexibility) and <strong>real option valuation</strong> (which elevates it). The reconciliation is elegant: NPV is not wrong — it is <em>incomplete</em>. Real options do not replace NPV; they complement it.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>NPV and real options are like a photograph and a video of the same scene. The photograph (NPV) captures a single moment — the expected cash flow path. The video (real options) captures the full range of movement — what happens when conditions change and the firm adapts. The video is more informative, but the photograph is still accurate for what it shows.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">The Reconciliation Framework</p>

        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">1</span>
            <div>
              <strong style="font-size:14px;">Start with NPV — Always</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">Compute the standard static NPV of the project using expected cash flows and an appropriate discount rate. This is the baseline — the value of the project if the firm commits to a single fixed strategy and never adapts.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">2</span>
            <div>
              <strong style="font-size:14px;">Identify Embedded Options</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">Ask: Does the project give the firm the exclusive right to expand? Can the firm abandon and recover salvage value? Is there an option to delay? Each embedded option should be identified, described, and assessed for whether it meets the conditions for genuine value (exclusivity, uncertainty, time).</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">3</span>
            <div>
              <strong style="font-size:14px;">Value the Options Separately</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">Use option pricing models (Black-Scholes, binomial trees) with explicitly stated inputs. The option values are additive to NPV — but only if they don't overlap or double-count. An expansion option and a delay option on the same project cannot be valued independently and summed.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">4</span>
            <div>
              <strong style="font-size:14px;">Total Value = NPV + Option Values</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">The complete project value incorporates both the static cash flow expectation and the value of flexibility. A project that is rejected on NPV alone may be accepted when option values are included — and this is not a fudge but a genuine economic insight.</span>
            </div>
          </div>
        </div>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin:18px 0;">
          <div style="font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;">The Three Real Options — Summary</div>
          <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:2px;font-size:12px;">
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:var(--radius-sm) 0 0 0;"></div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;text-align:center;">Option to Delay</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;text-align:center;">Option to Expand</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:0 var(--radius-sm) 0 0;text-align:center;">Option to Abandon</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Option type</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Call</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Call</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Put</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Underlying</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Project value</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Expansion cash flows</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Project remaining CFs</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Strike price</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Investment cost</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Expansion cost</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Salvage value</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Key value driver</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Exclusivity + time</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Barriers + scale</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Salvage + volatility</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Classic example</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Oil lease, patent</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Test market, platform</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Aircraft, leased assets</div>
          </div>
        </div>

        <div class="key-takeaway">
          <div class="kt-label">🎯 Chapter 29 — The Big Picture</div>
          <ul>
            <li><strong>The option to expand transforms "strategic" investing from vague intuition into quantifiable value.</strong> A negative-NPV pilot is rational when it creates an exclusive right to make a much larger, potentially profitable follow-on investment.</li>
            <li><strong>Four conditions must hold for expansion options to be valuable:</strong> The initial investment must create a competitive advantage, barriers to entry must exist, the expansion market must be uncertain, and the expansion opportunity must be proportionally large.</li>
            <li><strong>Expansion options explain premium valuations:</strong> Many high-multiple firms trade above DCF because the market prices in options to expand into new markets, products, or geographies. This is rational — but only when the options are genuine and quantifiable.</li>
            <li><strong>Financial flexibility is an option on unknown future investments.</strong> Maintaining excess cash or unused debt capacity has genuine option value — especially in volatile environments where attractive opportunities appear unpredictably.</li>
            <li><strong>The option to abandon is a put option</strong> that sets a floor on losses. Projects with high salvage value, uncertain cash flows, and long lives benefit most. When choosing between similar-NPV projects, prefer the one with higher salvage value.</li>
            <li><strong>NPV and real options are complements, not substitutes.</strong> Always start with NPV, identify embedded options, value them separately, and sum. The total project value = NPV + Option Value. This framework is more complete than either approach alone.</li>
          </ul>
        </div>
      </div>`
    ]
  },

  30: {
    subtitle: "When a firm's assets are worth less than its debt, standard DCF says equity is worthless. But equity still trades at positive prices — sometimes substantial ones. The resolution lies in recognizing equity as a call option on the firm's assets: as long as there's time and volatility, there's a chance the assets recover and equity holders capture the upside.",
    sections: [
      // Section 0: Equity in Highly Levered Distressed Firms
      `<div class="rich-content">
        <p>Damodaran opens with a puzzle: firms whose liabilities clearly exceed their assets — firms that are, in accounting terms, <strong>insolvent</strong> — often have equity that trades at positive market prices. Under standard DCF logic, this shouldn't happen. If the value of the firm's assets ($800M) is less than its debt ($1B), the equity residual is negative — equity should be worth zero.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Equity in a distressed firm is like a deep out-of-the-money call option. Imagine you hold a call option on a stock trading at $30 with a strike price of $50. The option is currently "underwater" — exercising it would be irrational. But it still has value because the stock <em>might</em> rise above $50 before expiration. Similarly, equity in a distressed firm has value because the firm's assets <em>might</em> recover above the debt level before the debt comes due.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">The Equity-as-Option Framework</p>

        <p>The key insight: equity in a levered firm is <strong>always</strong> a call option on the firm's assets, with the face value of debt as the strike price. In a healthy firm, this option is deep in-the-money (assets >> debt), so it behaves like a stock and the option framework isn't needed. But in a distressed firm — where the option is at-the-money or out-of-the-money — the option characteristics dominate behavior.</p>

        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin:16px 0;">
          <div style="font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;">Equity as a Call Option — Mapping</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;font-size:12px;">
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:var(--radius-sm) 0 0 0;">Parameter</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;text-align:center;">Call Option</div>
            <div style="padding:10px;background:var(--sidebar-bg);color:var(--cream);font-weight:600;border-radius:0 var(--radius-sm) 0 0;text-align:center;">Equity in Distressed Firm</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Underlying (S)</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Stock price</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Market value of firm's assets</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Strike price (K)</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Exercise price</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Face value of outstanding debt</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Expiration (T)</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Option maturity</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Weighted average maturity of debt</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Volatility (σ)</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Stock volatility</div>
            <div style="padding:8px 10px;background:var(--cream);text-align:center;">Variance in firm asset value</div>
            <div style="padding:8px 10px;background:var(--warm-white);font-weight:500;">Dividend yield (y)</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Dividend rate</div>
            <div style="padding:8px 10px;background:var(--warm-white);text-align:center;">Debt service / asset value</div>
            <div style="padding:8px 10px;background:var(--cream);font-weight:500;">Risk-free rate (r)</div>

          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">

            <div style="padding:8px 12px;background:var(--warm-white);border-radius:6px;font-size:12px;text-align:center;margin-top:10px;font-family:'JetBrains Mono',monospace;">

      // Section 1: Implications of Viewing Equity as an Option
      `<div class="rich-content">
        <p>Once you see equity as a call option, several puzzling behaviors of distressed firms suddenly make sense. The option framework explains why equity investors behave in ways that seem irrational under DCF logic but are perfectly rational under option logic.</p>

          <div class="sub-analogy-label">Analogy</div>
          <p>When you hold an out-of-the-money option that's about to expire, you want maximum volatility. You don't care about the expected outcome (which is likely zero) — you care about the tail scenario where the underlying spikes. Similarly, equity holders in a distressed firm rationally prefer <em>more</em> risk, because the upside is theirs while the downside belongs to creditors.</p>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Five Behavioral Implications</p>

          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">

              <span style="font-size:13px;color:var(--text-secondary);">In a healthy firm, risk is bad for both equity and debt holders. In a distressed firm, risk is <strong>good for equity</strong> and <strong>bad for debt</strong>. Higher asset volatility increases the probability that assets will exceed debt before expiry — making the call option more valuable. This is why distressed firms often gamble on risky projects, asset sales, or aggressive strategies that increase variance.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">2</span>

              <span style="font-size:13px;color:var(--text-secondary);">Paying down debt reduces the strike price of the call option — which, in a distressed firm, <em>transfers value from equity to debt</em>. Every dollar used to pay debt reduces the option value of equity. This explains why distressed firms resist asset sales to repay creditors — the equity holders lose the optionality.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">3</span>

              <strong style="font-size:14px;">Time Is the Enemy of Creditors</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">Longer time to debt maturity increases the option value of equity (more time for a recovery) and decreases the value of debt (more time for things to go wrong). This creates a conflict: equity holders want to extend maturities; creditors want to accelerate repayment. Bankruptcy battles are fundamentally about the distribution of time value.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">4</span>
            <div>
              <strong style="font-size:14px;">Dividends Destroy Equity Option Value</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">Paying dividends reduces firm assets (the underlying of the option) without reducing debt (the strike). For a healthy firm, dividends are a return of excess cash. For a distressed firm, dividends are an asset stripping that transfers value from creditors to equity holders — which is why bond covenants typically restrict dividends when leverage ratios exceed thresholds.</span>
            </div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:14px 0;">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">5</span>
            <div>
              <strong style="font-size:14px;">Negative NPV Projects Can Be Rational (for Equity)</strong><br>
              <span style="font-size:13px;color:var(--text-secondary);">A project with negative NPV that dramatically increases asset variance can increase equity value — because the upside goes to equity while the additional downside is absorbed by creditors. This is the classic "gambling for resurrection" behavior observed in distressed firms, banks before bailouts, and insurance companies before regulatory intervention.</span>

        </div>
      </div>`,

      // Section 2: Estimating the Value of Equity as an Option
      `<div class="rich-content">
        <p>Damodaran moves from theory to practice: how to actually <strong>estimate the value of equity</strong> in a distressed firm using option pricing. The framework uses Black-Scholes (or a binomial model) with the firm's asset value as the underlying and the face value of debt as the strike price.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Estimating equity value in a distressed firm is like pricing an options contract where the stock price (firm assets) and strike price (debt) are both uncertain. You know the formula, but every input requires careful estimation — and small changes in the inputs produce large swings in the answer, which is exactly what you'd expect for an out-of-the-money option.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">The Five Inputs — Estimated for a Distressed Firm</p>

          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);">

            <div><strong style="font-size:14px;">Face Value of Debt</strong><br><span style="font-size:13px;color:var(--text-secondary);">The total principal amount owed to creditors. For complex capital structures with multiple debt tranches, use the total face value across all classes. This is the "strike" — the amount equity holders must "pay" (through asset value) to keep the firm.</span></div>
