<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Valuation — Damodaran Study Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FDF6EC;
  --cream-dark: #F5EBDA;
  --sand: #EDE0CC;
  --warm-white: #FFFCF7;
  --terracotta: #C4652E;
  --terracotta-light: #E8875A;
  --terracotta-glow: rgba(196,101,46,0.12);
  --amber: #D4960A;
  --amber-light: #F0C75E;
  --forest: #2D5F4A;
  --forest-light: #3E7A60;
  --slate: #3A3631;
  --slate-soft: #5C554D;
  --slate-light: #8A8279;
  --text-primary: #2C2825;
  --text-secondary: #6B6360;
  --text-muted: #9E9590;
  --sidebar-bg: #2C2825;
  --sidebar-text: #D9CFC4;
  --sidebar-hover: rgba(255,252,247,0.07);
  --sidebar-active: rgba(196,101,46,0.2);
  --border: rgba(58,54,49,0.1);
  --shadow-sm: 0 1px 3px rgba(44,40,37,0.06);
  --shadow-md: 0 4px 16px rgba(44,40,37,0.08);
  --shadow-lg: 0 8px 32px rgba(44,40,37,0.1);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Source Sans 3', -apple-system, sans-serif;
  background: var(--cream);
  color: var(--text-primary);
  display: flex;
  min-height: 100vh;
  overflow-x: hidden;
  max-width: 100vw;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 320px;
  min-width: 320px;
  background: var(--sidebar-bg);
  color: var(--sidebar-text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: fixed;
  left: 0;
  top: 0;
  z-index: 100;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.sidebar.collapsed { transform: translateX(-320px); }

.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.sidebar-header h1 {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 700;
  color: #FDF6EC;
  line-height: 1.3;
  letter-spacing: -0.01em;
}
.sidebar-header .subtitle {
  font-size: 12.5px;
  color: var(--slate-light);
  margin-top: 4px;
  font-weight: 400;
  letter-spacing: 0.03em;
}

.sidebar-search {
  padding: 16px 20px 12px;
}
.sidebar-search input {
  width: 100%;
  padding: 10px 14px 10px 36px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--cream);
  font-size: 13.5px;
  font-family: inherit;
  outline: none;
  transition: all 0.2s;
}
.sidebar-search input::placeholder { color: var(--slate-light); }
.sidebar-search input:focus {
  background: rgba(255,255,255,0.1);
  border-color: var(--terracotta);
}
.sidebar-search .search-icon {
  position: absolute;
  left: 32px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.4;
}
.sidebar-search { position: relative; }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 24px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

.part-group { margin-bottom: 4px; }
.part-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--terracotta-light);
  cursor: pointer;
  user-select: none;
  transition: color 0.2s;
}
.part-header:hover { color: var(--amber-light); }
.part-header .arrow {
  font-size: 9px;
  transition: transform 0.25s;
  opacity: 0.6;
}
.part-group.open > .part-header .arrow { transform: rotate(90deg); }
.part-chapters { display: none; }
.part-group.open > .part-chapters { display: block; }

.chapter-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 20px 9px 28px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
}
.chapter-item:hover {
  background: var(--sidebar-hover);
}
.chapter-item.active {
  background: var(--sidebar-active);
  border-left-color: var(--terracotta);
}
.chapter-num {
  font-family: 'Fraunces', serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--terracotta-light);
  min-width: 22px;
  opacity: 0.8;
  padding-top: 1px;
}
.chapter-title-text {
  font-size: 13px;
  line-height: 1.4;
  font-weight: 400;
}
.chapter-item.active .chapter-title-text { color: #FDF6EC; font-weight: 500; }

.section-list { display: none; padding: 2px 0 6px 0; }
.chapter-item.active + .section-list { display: block; }
.section-item {
  padding: 5px 20px 5px 60px;
  font-size: 12px;
  color: var(--slate-light);
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.4;
}
.section-item:hover { color: var(--cream); background: var(--sidebar-hover); }
.section-item.active-section { color: var(--amber-light); font-weight: 500; }

/* ── PROGRESS BAR ── */
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.progress-bar-container {
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-bar {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--terracotta), var(--amber));
  border-radius: 2px;
  transition: width 0.5s ease;
}
.progress-text {
  font-size: 11px;
  color: var(--slate-light);
  min-width: 48px;
  text-align: right;
}

/* ── MAIN CONTENT ── */
.main {
  margin-left: 320px;
  flex: 1;
  min-height: 100vh;
  transition: margin-left 0.35s cubic-bezier(0.4,0,0.2,1);
}
.sidebar.collapsed ~ .main { margin-left: 0; }

.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(253,246,236,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.menu-toggle {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--warm-white);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-secondary);
  transition: all 0.2s;
}
.menu-toggle:hover { border-color: var(--terracotta); color: var(--terracotta); }
.breadcrumb {
  font-size: 13px;
  color: var(--text-muted);
}
.breadcrumb span { color: var(--text-primary); font-weight: 500; }

.topbar-right { display: flex; align-items: center; gap: 10px; }
.view-btn {
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--warm-white);
  font-size: 12.5px;
  font-family: inherit;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.2s;
}
.view-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
.view-btn.active { background: var(--terracotta); color: white; border-color: var(--terracotta); }

/* ── CONTENT AREA ── */
.content-wrapper {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 48px 80px;
}

/* Welcome / Landing */
.welcome-screen { text-align: center; padding: 60px 0 40px; }
.welcome-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--terracotta-glow), rgba(212,150,10,0.1));
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
  font-size: 36px;
}
.welcome-screen h2 {
  font-family: 'Fraunces', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.welcome-screen p {
  font-size: 16px;
  color: var(--text-secondary);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.7;
}

/* Part Overview Cards */
.parts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  margin-top: 40px;
}
.part-card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 24px;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  position: relative;
  overflow: hidden;
}
.part-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: var(--radius-md) var(--radius-md) 0 0;
}
.part-card:nth-child(1)::before { background: var(--terracotta); }
.part-card:nth-child(2)::before { background: var(--amber); }
.part-card:nth-child(3)::before { background: var(--forest); }
.part-card:nth-child(4)::before { background: #7B68A8; }
.part-card:nth-child(5)::before { background: #C4522E; }
.part-card:nth-child(6)::before { background: #2A7B9B; }
.part-card:nth-child(7)::before { background: var(--slate-soft); }

.part-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: transparent;
}
.part-card .part-label {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.part-card h3 {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
  line-height: 1.35;
}
.part-card p {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.55;
}
.part-card .ch-count {
  margin-top: 14px;
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}

/* ── CHAPTER VIEW ── */
.chapter-view { display: none; }
.chapter-view.visible { display: block; }

.chapter-header {
  margin-bottom: 36px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
}
.chapter-header .part-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--terracotta);
  margin-bottom: 8px;
}
.chapter-header h2 {
  font-family: 'Fraunces', serif;
  font-size: 30px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.015em;
  color: var(--text-primary);
  margin-bottom: 10px;
}
.chapter-header .chapter-subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.6;
  max-width: 680px;
}

/* Analogy Banner */
.analogy-banner {
  background: linear-gradient(135deg, var(--terracotta-glow), rgba(212,150,10,0.08));
  border: 1px solid rgba(196,101,46,0.15);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  margin-bottom: 32px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.analogy-banner .icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
.analogy-banner .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--terracotta);
  margin-bottom: 4px;
}
.analogy-banner p {
  font-size: 14.5px;
  color: var(--text-primary);
  line-height: 1.6;
  font-style: italic;
}

/* Section Cards */
.section-card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: 16px;
  overflow: hidden;
  transition: all 0.2s;
}
.section-card:hover { box-shadow: var(--shadow-sm); }
.section-card-header {
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.section-card-header h3 {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}
.section-card-header .toggle-icon {
  font-size: 18px;
  color: var(--text-muted);
  transition: transform 0.25s;
}
.section-card.open .toggle-icon { transform: rotate(45deg); }
.section-card-body {
  display: none;
  padding: 0 24px 24px;
  overflow-x: hidden;
  overflow-wrap: break-word;
  word-wrap: break-word;
}
.section-card.open .section-card-body { display: block; }

.placeholder-content {
  padding: 24px;
  background: var(--cream);
  border-radius: var(--radius-sm);
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
  font-style: italic;
  border: 1px dashed rgba(58,54,49,0.12);
}

/* Key Concept Pill */
.concept-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  background: rgba(45,95,74,0.08);
  border-radius: 20px;
  font-size: 12px;
  color: var(--forest);
  font-weight: 500;
  margin: 3px;
}

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .sidebar {
    transform: translateX(-320px);
    width: 300px;
    min-width: 300px;
  }
  .sidebar.mobile-open { transform: translateX(0); }
  .main { margin-left: 0 !important; }
  .content-wrapper { padding: 24px 16px 60px; }
  .topbar { padding: 12px 16px; }

  /* Overlay when sidebar open */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 99;
  }
  .sidebar-overlay.visible { display: block; }

  /* Stack all grids on mobile */
  .parts-grid,
  .investor-type-grid { grid-template-columns: 1fr !important; }

  /* Force all inline grids to single column */
  .section-card-body div[style*="grid-template-columns: 1fr 1fr"],
  .section-card-body div[style*="grid-template-columns:1fr 1fr"],
  .rich-content div[style*="grid-template-columns: 1fr 1fr"],
  .rich-content div[style*="grid-template-columns:1fr 1fr"],
  .rich-content div[style*="grid-template-columns: 1fr 1fr 1fr"],
  .rich-content div[style*="grid-template-columns:1fr 1fr 1fr"],
  .rich-content div[style*="repeat(auto-fill"] {
    grid-template-columns: 1fr !important;
  }

  /* Prevent horizontal overflow */
  .section-card-body,
  .rich-content,
  .section-card,
  .chapter-view,
  .content-wrapper {
    overflow-x: hidden;
    max-width: 100%;
  }
  .rich-content div[style*="font-family:'JetBrains Mono'"],
  .rich-content div[style*="font-family: 'JetBrains Mono'"] {
    font-size: 11px !important;
    word-break: break-all;
    overflow-wrap: break-word;
  }

  /* Chapter header */
  .chapter-header h2 { font-size: 24px; }
  .welcome-screen h2 { font-size: 26px; }
  .welcome-screen p { font-size: 14px; }

  /* Prev/next nav stacking */
  .chapter-view > div:last-child {
    flex-direction: column;
    gap: 8px;
  }
  .chapter-view > div:last-child .view-btn {
    text-align: center !important;
    width: 100%;
  }
}

@media (max-width: 480px) {
  .content-wrapper { padding: 18px 12px 50px; }
  .section-card-body { padding: 0 14px 18px; }
  .section-card-header { padding: 14px 16px; }
  .section-card-header h3 { font-size: 14.5px; }
  .analogy-banner { padding: 14px 16px; flex-direction: column; gap: 8px; }
  .sub-analogy { padding: 12px 14px; }
  .myth-card { padding: 14px 16px; }
  .key-takeaway { padding: 14px 16px; }
  .chapter-header h2 { font-size: 21px; }
  .part-card { padding: 18px; }
  .breadcrumb { font-size: 11.5px; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-right .view-btn { padding: 6px 10px; font-size: 11.5px; }
  .investor-type-grid { gap: 10px; }
  .investor-card { padding: 14px; }
}

/* ── SCROLLBAR ── */
.sidebar-nav::-webkit-scrollbar { width: 5px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* ── ANIMATIONS ── */
@keyframes fadeInUp {
  from { opacity:0; transform: translateY(16px); }
  to { opacity:1; transform: translateY(0); }
}
.fade-in { animation: fadeInUp 0.45s ease forwards; }
.fade-in-d1 { animation-delay: 0.05s; opacity: 0; }
.fade-in-d2 { animation-delay: 0.1s; opacity: 0; }
.fade-in-d3 { animation-delay: 0.15s; opacity: 0; }
.fade-in-d4 { animation-delay: 0.2s; opacity: 0; }

/* Quick-ref badge */
.badge {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.03em;
}
.badge-dcf { background: rgba(196,101,46,0.12); color: var(--terracotta); }
.badge-rel { background: rgba(123,104,168,0.12); color: #7B68A8; }
.badge-opt { background: rgba(42,123,155,0.12); color: #2A7B9B; }
.badge-found { background: rgba(45,95,74,0.1); color: var(--forest); }

/* ── RICH CONTENT STYLES ── */
.rich-content { line-height: 1.75; color: var(--text-primary); }
.rich-content p { margin-bottom: 14px; font-size: 14.5px; }
.rich-content p:last-child { margin-bottom: 0; }

.sub-analogy {
  background: linear-gradient(135deg, rgba(212,150,10,0.07), rgba(240,199,94,0.05));
  border-left: 3px solid var(--amber);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 14px 18px;
  margin: 16px 0;
  font-size: 14px;
  color: var(--text-primary);
}
.sub-analogy .sub-analogy-label {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 4px;
}
.sub-analogy p { font-style: italic; margin-bottom: 0; }

.myth-card {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  margin: 14px 0;
}
.myth-card .myth-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
}
.myth-card .myth-icon {
  font-size: 18px;
  flex-shrink: 0;
}
.myth-card .myth-title {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.35;
}
.myth-card .myth-body {
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.65;
}
.myth-card .myth-body strong { color: var(--text-primary); font-weight: 600; }
.myth-card .myth-verdict {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 13px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.myth-card .myth-verdict .verdict-icon { font-size: 15px; flex-shrink: 0; }
.myth-card .myth-verdict .verdict-text { color: var(--forest); font-weight: 500; line-height: 1.5; }

.key-takeaway {
  background: linear-gradient(135deg, rgba(45,95,74,0.06), rgba(62,122,96,0.04));
  border: 1px solid rgba(45,95,74,0.15);
  border-radius: var(--radius-md);
  padding: 18px 22px;
  margin: 18px 0;
}
.key-takeaway .kt-label {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--forest);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.key-takeaway ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
.key-takeaway li {
  font-size: 13.5px;
  color: var(--text-primary);
  padding: 5px 0 5px 20px;
  position: relative;
  line-height: 1.55;
}
.key-takeaway li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--forest);
  font-weight: 600;
}

.investor-type-grid {
  display: grid;

            <span class="verdict-text"><strong>Reality:</strong> Be a skeptic. Markets make mistakes, but finding them requires skill and luck. When your valuation disagrees with the market, start with the presumption that the market is right — then prove otherwise.</span>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header">
            <span class="myth-icon">🧭</span>
            <span class="myth-title">Myth 6: "Only the final number (the value) matters"</span>
          </div>
          <div class="myth-body">
            Focusing only on the output ("is it undervalued?") misses the richest part. The <strong>process</strong> of valuation reveals what drives value: What is high growth worth? How much does a brand contribute? What happens if margins improve? These insights are valuable even if you believe the market price is correct.
          </div>
          <div class="sub-analogy">
            <div class="sub-analogy-label">Analogy</div>
            <p>A doctor's diagnosis (the number) matters, but the examination process reveals far more — which organs are healthy, which are stressed, what lifestyle changes would help. Valuation is the full check-up, not just the blood pressure reading.</p>
          </div>
          <div class="myth-verdict">
            <span class="verdict-icon">✅</span>
            <span class="verdict-text"><strong>Reality:</strong> The journey is the destination. Valuation forces you to think rigorously about what makes a business valuable — and that understanding is the real payoff, regardless of where the stock trades today.</span>
          </div>
        </div>
      </div>`,

      // Section 2: The Role of Valuation
      `<div class="rich-content">
        <p>Valuation doesn't live in a vacuum — it's a tool used differently in different arenas. Damodaran maps out three major use cases: <strong>portfolio management</strong>, <strong>acquisition analysis</strong>, and <strong>corporate finance</strong>. Who you are determines how you use it.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>A hammer is the same tool whether a carpenter, a sculptor, or a demolition worker uses it — but the technique, purpose, and result are completely different. Valuation is the same: the models don't change, but how you wield them depends on the context.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 14px;color:var(--text-primary);">Valuation in Portfolio Management</p>
        <p>Different investment philosophies give valuation a different seat at the table — from center stage to backstage:</p>

        <div class="investor-type-grid">
          <div class="investor-card">
            <div class="ic-icon">📊</div>
            <h4>Fundamental Analysts</h4>
            <p>True value comes from financial characteristics — growth, risk, cash flows. Deviations from intrinsic value are opportunities. They hold portfolios of undervalued stocks, trusting the math will win over time.</p>
            <div class="val-role">Valuation = the whole game</div>
          </div>
          <div class="investor-card">
            <div class="ic-icon">🏰</div>
            <h4>Franchise Buyers</h4>

            <div class="val-role">Valuation = the entry ticket + renovation plan</div>
          </div>
          <div class="investor-card">
            <div class="ic-icon">📈</div>
            <h4>Chartists / Technical Analysts</h4>
            <p>Prices move on investor psychology and trading patterns. Fundamentals take a back seat. Valuation can sometimes provide support/resistance levels, but it's not the primary tool.</p>
            <div class="val-role">Valuation = optional side dish</div>
          </div>
          <div class="investor-card">
            <div class="ic-icon">⚡</div>
            <h4>Information Traders</h4>
            <p>Trade on news — buying before good announcements, selling before bad ones. The focus is on how information changes value, not on value itself. Speed and anticipation matter more than precision.</p>
            <div class="val-role">Valuation = the delta, not the level</div>
          </div>
          <div class="investor-card">
            <div class="ic-icon">🌊</div>
            <h4>Market Timers</h4>
            <p>Bet on whole-market movements rather than individual stocks. The market can be valued as a whole and compared to its current level — or the fraction of overvalued stocks can signal turning points.</p>
            <div class="val-role">Valuation = the barometer</div>
          </div>
          <div class="investor-card">
            <div class="ic-icon">⚖️</div>
            <h4>Efficient Marketers</h4>
            <p>Market price = best estimate of true value. Valuation is still useful — not to find mispricing, but to understand what assumptions (growth, risk) the market is baking into the current price.</p>
            <div class="val-role">Valuation = reverse-engineering, not stock-picking</div>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:28px 0 14px;color:var(--text-primary);">Valuation in Acquisition Analysis</p>

        <div class="use-case-row">
          <span class="uc-icon">🏢</span>
          <div>
            <h4>The Bidder's Perspective</h4>
            <p>Before making an offer, you need a fair value for the target. But beware of "strategic acquisition bias" — when the decision to acquire is made <em>before</em> the valuation, the numbers tend to magically support the deal. You also need to value <strong>synergy</strong> (cost savings, revenue gains from combining) and <strong>management change</strong> (what would the target be worth if run differently?).</p>
          </div>
        </div>
        <div class="use-case-row">
          <span class="uc-icon">🛡️</span>
          <div>
            <h4>The Target's Perspective</h4>
            <p>The target must determine if the offer is fair. Naturally, targets in hostile takeovers tend to produce optimistically biased valuations to persuade shareholders to reject the bid. The key is to evaluate the offer against a genuine intrinsic value, not a motivated estimate.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Acquisition valuation is like a real estate negotiation: the buyer sees "potential after renovations" (synergy), the seller insists on the "charm of the original character" (standalone value). Both are biased, and the truth usually sits somewhere in between.</p>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:28px 0 14px;color:var(--text-primary);">Valuation in Corporate Finance</p>

        <p>If the goal of corporate finance is to <strong>maximize firm value</strong>, then every decision — which projects to invest in, how to finance them, how much to pay as dividends — must be evaluated through the lens of its impact on value. Management consultants have built entire practices around this idea, helping companies restructure to create (or protect) value. Valuation is the compass that tells management whether their decisions are pointing in the right direction.</p>

        <div class="key-takeaway">
          <div class="kt-label">🎯 Chapter 1 — The Big Picture</div>

            <li><strong>Philosophy:</strong> Never pay more than an asset is worth. Value is anchored to cash flows, not perceptions alone.</li>

            <li><strong>Context matters:</strong> A fundamental analyst, an M&A banker, and a CFO all use valuation differently — but the same principles underpin all three.</li>

          </ul>

  2: {
    subtitle: "There are three big roads to value: compute the intrinsic worth from cash flows (DCF), compare the asset to similar ones (Relative), or price the flexibility embedded in it (Options). Each road has different scenery — and different potholes.",
    sections: [
      // Section 0: Discounted Cash Flow Valuation
      `<div class="rich-content">
        <p>DCF is the bedrock — even if you end up using relative valuation or option pricing, understanding DCF is what keeps you honest. The idea is deceptively simple: <strong>an asset is worth the present value of all the cash it will generate in the future</strong>.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Imagine you're buying a vending machine. It generates cash every day — coins drop in, drinks come out. What would you pay for it? Logically, you'd estimate how much cash it will produce over its lifetime, then discount those future coins back to today (because a dollar tomorrow is worth less than a dollar today). That's DCF in a nutshell.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">The Core Formula</p>
        <p>Every DCF model is a variation of this fundamental equation:</p>
        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:14px 0;font-family:'JetBrains Mono',monospace;font-size:13.5px;text-align:center;line-height:1.8;">
          Value = CF₁/(1+r)¹ + CF₂/(1+r)² + ... + CFₙ/(1+r)ⁿ<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12.5px;color:var(--text-muted);font-style:italic;">where CF = cash flow in period t, r = discount rate reflecting risk, n = life of asset</span>
        </div>
        <p>The cash flows vary by asset (dividends for stocks, coupons for bonds, after-tax operating cash flows for projects), and the discount rate rises with risk.</p>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Two Paths: Equity vs. Firm Valuation</p>
        <p>This is where many analysts trip. There are two ways to run a DCF, and <strong>mixing them up is the #1 mechanical error in valuation</strong>:</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--terracotta);">🔑 Equity Valuation</h4>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin:0;">Discount <strong>cash flows to equity</strong> (after debt payments) at the <strong>cost of equity</strong>. You get the value of equity directly.</p>
            <div style="margin-top:10px;padding:10px;background:var(--warm-white);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center;">
              CF to Equity → discount at Kₑ → <strong>Equity Value</strong>
            </div>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--forest);">🏢 Firm Valuation</h4>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin:0;">Discount <strong>cash flows to the firm</strong> (before debt payments) at the <strong>WACC</strong>. Then subtract debt to get equity value.</p>
            <div style="margin-top:10px;padding:10px;background:var(--warm-white);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center;">
              CF to Firm → discount at WACC → Firm Value − Debt = <strong>Equity</strong>
            </div>
          </div>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Think of a rental apartment building with a mortgage. Equity valuation is like calculating what the owner takes home after paying the bank each month, and valuing that stream. Firm valuation is like valuing the entire building's rental income (ignoring the mortgage), then subtracting what's owed to the bank. Same destination, different route.</p>
        </div>

        <div class="myth-card">
          <div class="myth-header">
            <span class="myth-icon">⚠️</span>
            <span class="myth-title">The Deadly Mismatch Error</span>
          </div>
          <div class="myth-body">
            Discounting equity cash flows at WACC <strong>overstates</strong> equity value (you're using too low a rate). Discounting firm cash flows at the cost of equity <strong>understates</strong> firm value (too high a rate). Damodaran shows that in a worked example, the first error inflated equity by $175M and the second understated the firm by $260M. The rule is simple: <strong>match your cash flows to your discount rate</strong>.
          </div>
          <div class="myth-verdict">
            <span class="verdict-icon">🔴</span>
            <span class="verdict-text"><strong>Golden Rule:</strong> Cash flows to equity → Cost of equity. Cash flows to firm → WACC. Never cross the streams.</span>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Cost of Capital vs. APV</p>
        <p>Within firm valuation, there are two sub-approaches to handle the effects of debt:</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;">
            <h4 style="font-family:'Fraunces',serif;font-size:13.5px;font-weight:600;margin-bottom:6px;">WACC Approach</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Bake the tax benefit of debt into the discount rate itself. The WACC blends equity and after-tax debt costs. Simple and widely used.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;">
            <h4 style="font-family:'Fraunces',serif;font-size:13.5px;font-weight:600;margin-bottom:6px;">APV Approach</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0;">Value the firm as if 100% equity-funded, then <em>separately</em> add the tax shield from debt and subtract expected bankruptcy costs. More transparent — you see each piece.</p>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Total Cash Flow vs. Excess Return Models</p>
        <p>A subtle but illuminating distinction. The standard DCF values <em>all</em> cash flows. An excess return model only values cash flows <strong>above</strong> the required return, then adds back the invested capital. Both yield the same answer, but the excess return model drives home a critical insight: <em>it's not the earnings themselves that create value, but earnings above the cost of capital</em>.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>If you invest $100K in a business and earn $12K/year, while a bank would give you $10K/year risk-free — your "excess return" is $2K/year. Only that $2K is truly creating value. The total return model says the business is worth $120K. The excess model says it's worth $100K (what you put in) + $20K (the present value of the $2K annual excess). Same number, different story.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">When DCF Struggles</p>
        <p>DCF works best when cash flows are positive and predictable. It gets harder — but more valuable — in these situations:</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;">
          <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:15px;">🔥</span>
            <strong style="font-size:13px;display:block;margin:4px 0 2px;">Distressed Firms</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Negative earnings, bankruptcy risk. DCF assumes the firm is a going concern.</span>
          </div>
          <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:15px;">🎢</span>
            <strong style="font-size:13px;display:block;margin:4px 0 2px;">Cyclical Firms</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Earnings follow the economy. In a recession, they look distressed even if they're not.</span>
          </div>
          <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:15px;">🏝️</span>
            <strong style="font-size:13px;display:block;margin:4px 0 2px;">Unutilized Assets</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Land, patents, options that produce no cash today but have value. DCF misses them.</span>
          </div>
          <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:15px;">🔄</span>
            <strong style="font-size:13px;display:block;margin:4px 0 2px;">Restructuring Firms</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Selling assets, changing capital structure. Historical data is misleading.</span>
          </div>
          <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:15px;">🤝</span>
            <strong style="font-size:13px;display:block;margin:4px 0 2px;">Acquisitions</strong>
            <span style="font-size:12px;color:var(--text-secondary);">Synergy and management changes make it hard to estimate future cash flows.</span>
          </div>
          <div style="padding:12px 14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <span style="font-size:15px;">🔒</span>
            <strong style="font-size:13px;display:block;margin:4px 0 2px;">Private Firms</strong>
            <span style="font-size:12px;color:var(--text-secondary);">No market prices to estimate risk parameters from. Must use proxies.</span>
          </div>
        </div>

        <div class="key-takeaway">
          <div class="kt-label">🎯 DCF Key Takeaways</div>
          <ul>
            <li>DCF is the foundation — even relative and option-based methods build on it</li>
            <li>Two paths (equity vs. firm) must never be mixed: match cash flows to discount rates</li>
            <li>WACC and APV are two ways to handle debt in firm valuation — same answer if assumptions are consistent</li>
            <li>DCF struggles with negative earnings, cyclical firms, and hidden assets — but can be adapted</li>
            <li>The excess return model reveals the core truth: only returns above the cost of capital create value</li>
          </ul>
        </div>
      </div>`,

      // Section 1: Relative Valuation
      `<div class="rich-content">
        <p>If DCF is the "engineer's approach" — building value from scratch using cash flows — then relative valuation is the "real estate agent's approach": <em>"What are comparable properties selling for?"</em> In practice, most valuations are relative, not DCF.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>You're selling your 3-bedroom house. You could hire an engineer to estimate the present value of all future rents (DCF). Or you could look at what the other 3-bedroom houses on your street sold for last month and adjust (Relative). Most people — and most analysts — do the second. It's faster, more intuitive, and (when done right) surprisingly informative.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">How It Works</p>
        <p>The core mechanics of relative valuation involve three steps:</p>
        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">1</span>
            <div><strong style="font-size:14px;">Standardize</strong><br><span style="font-size:13px;color:var(--text-secondary);">Convert prices into multiples (Price/Earnings, Price/Book, EV/EBITDA, Price/Sales) so you can compare apples to apples.</span></div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">2</span>
            <div><strong style="font-size:14px;">Find Comparables</strong><br><span style="font-size:13px;color:var(--text-secondary);">Identify firms similar in growth, risk, and cash flow characteristics. This is the hardest — and most subjective — step.</span></div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;">
            <span style="font-family:'Fraunces',serif;font-size:20px;color:var(--terracotta);font-weight:700;min-width:30px;">3</span>
            <div><strong style="font-size:14px;">Compare & Conclude</strong><br><span style="font-size:13px;color:var(--text-secondary);">If the firm trades at a lower multiple than its peers (after adjusting for differences), it may be undervalued — or there may be a good reason for the discount.</span></div>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Two Flavors of Comparison</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-left:3px solid #7B68A8;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:#7B68A8;">Cross-Sectional</h4>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.55;margin:0;">Compare a firm's multiple to peers <em>right now</em>. "Is this software company cheap relative to other software companies today?" Most common approach.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-left:3px solid var(--amber);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--amber);">Time Series</h4>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.55;margin:0;">Compare a firm's current multiple to its <em>own history</em>. "Is Ford cheap compared to where Ford usually trades?" Requires that fundamentals haven't changed.</p>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">The Hidden Assumption</p>
        <p>Relative valuation rests on a critical assumption: <strong>the market is right on average, but wrong on individual stocks</strong>. If the entire software sector is in a bubble (all firms overvalued), relative valuation will happily tell you a stock is "cheap" relative to its overvalued peers — and you'll still lose money.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>If every house on your street is priced at twice its real value because of a housing bubble, comparing your house to the neighbors proves nothing about whether it's actually a good deal. Relative valuation works within the frame the market sets — if the frame itself is crooked, so are all the conclusions.</p>
        </div>

        <div class="myth-card">
          <div class="myth-header">
            <span class="myth-icon">🎭</span>
            <span class="myth-title">The Comparable Manipulation Problem</span>
          </div>
          <div class="myth-body">
            Damodaran illustrates this with a memorable example: an analyst valuing a software IPO finds that the industry average P/E is 24×. But drop the two cheapest firms and it becomes 27×. Drop the two most expensive and it falls to 21×. A biased analyst can pick their "comparable" group to get almost any number they want. Unlike DCF, where assumptions are explicit, multiples let bias hide in the choice of comps.
          </div>
          <div class="myth-verdict">
            <span class="verdict-icon">✅</span>
            <span class="verdict-text"><strong>Defense:</strong> Always ask — who was included in the comp set and why? What happens if you change the group? Transparency about comp selection is the antidote to manipulation.</span>
          </div>
        </div>

        <div class="key-takeaway">
          <div class="kt-label">🎯 Relative Valuation Key Takeaways</div>
          <ul>
            <li>Most real-world valuations are relative, not DCF — multiples are fast, intuitive, and market-anchored</li>
            <li>The approach assumes markets are right on average but may misprice individual stocks</li>
            <li>Two comparison types: cross-sectional (vs. peers today) and time series (vs. own history)</li>
            <li>Biggest risk: the comp set can be manipulated, and sector-wide mispricing goes undetected</li>
            <li>No two firms are identical — every comp requires adjustments for growth, risk, and cash flows</li>
          </ul>
        </div>
      </div>`,

      // Section 2: Contingent Claim Valuation
      `<div class="rich-content">
        <p>This is the most intellectually exciting — and least used — of the three approaches. Contingent claim (option-based) valuation recognizes that some assets have a special property: <strong>their payoff depends on a future event happening (or not happening)</strong>. Standard DCF, which values the "expected" outcome, systematically undervalues this kind of flexibility.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Imagine you own a lottery ticket that costs $1 and pays $1,000 if it rains tomorrow, $0 if it doesn't. The "expected value" (DCF) might say it's worth $100 (if there's a 10% chance of rain). But the ticket has a special property: your downside is capped at $1, while your upside is $1,000. Option pricing captures this asymmetry — the floor under your losses and the uncapped upside — in ways that DCF cannot.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">The Core Idea</p>
        <p>An <strong>option</strong> gives you the right — but not the obligation — to buy (call) or sell (put) an asset at a fixed price. It only "pays off" under certain conditions. The value of an option depends on five variables:</p>

        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:14px 0;">
          <div style="text-align:center;padding:14px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Financial Options vs. Real Options</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid #2A7B9B;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:#2A7B9B;">Financial Options</h4>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.55;margin:0;">Listed puts/calls, warrants, convertible bonds, LEAPS. The underlying is a <em>traded</em> financial asset, so inputs are easy to get from markets.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--terracotta);">Real Options</h4>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.55;margin:0;">Patents, undeveloped oil reserves, expansion rights, the option to abandon a project. The underlying is a <em>real</em> (often non-traded) asset — much harder to value.</p>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Where Option Thinking Shines</p>
        <p>Damodaran identifies several assets that are secretly options in disguise:</p>

        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:18px;">💊</span>
            <div><strong style="font-size:13.5px;">Patents</strong> — A pharma patent is a call option on a product. The "strike price" is the investment needed to commercialize it. The "expiration" is when the patent runs out.</div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:18px;">⛽</span>
            <div><strong style="font-size:13.5px;">Undeveloped Reserves</strong> — An oil company owns a reserve it hasn't drilled yet. It will only drill if oil prices justify it. DCF, using "expected" prices, misses this optionality.</div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:18px;">🏚️</span>
            <div><strong style="font-size:13.5px;">Equity in Distressed Firms</strong> — Equity holders own a call option on the firm's value, with the face value of debt as the strike price. Even if the firm seems worthless, the option has value if there's time and volatility.</div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;">
            <span style="font-size:18px;">🔓</span>
            <div><strong style="font-size:13.5px;">Expansion/Abandonment Rights</strong> — The right to expand if things go well, or cut losses if they don't. Traditional NPV misses the value of this managerial flexibility.</div>
          </div>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Think of a movie studio that buys the rights to a book. The rights cost $1M. Making the movie would cost $100M. If the book becomes a bestseller, they'll greenlight the movie (exercise the option). If it flops, they walk away losing only the $1M. DCF would average the scenarios; option pricing captures the asymmetry — the studio can choose to act only when conditions are favorable.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:24px 0 12px;color:var(--text-primary);">Limitations</p>
        <p>Option pricing models were built for short-term, traded assets. When applied to long-term real assets (like a 20-year patent on a non-traded product), the assumptions of constant variance and dividend yields become harder to defend, and the estimation error grows substantially. They are powerful complements to DCF, not replacements.</p>

        <div class="key-takeaway">
          <div class="kt-label">🎯 Chapter 2 — The Three Roads Compared</div>
          <ul>
            <li><strong>DCF:</strong> Build value from fundamentals. Best when cash flows are positive and estimable. The gold standard for intrinsic value.</li>
            <li><strong>Relative:</strong> Value by comparison. Fast, intuitive, widely used — but vulnerable to sector-wide mispricing and comp manipulation.</li>
            <li><strong>Options:</strong> Value flexibility and asymmetry. Powerful for patents, reserves, distressed equity — but estimation error grows for long-term, non-traded assets.</li>
            <li>The three approaches are not mutually exclusive — the best analysts use all three and triangulate.</li>
            <li>Every approach requires assumptions. The virtue of DCF is that assumptions are explicit. The virtue of multiples is speed. The virtue of options is capturing what DCF misses.</li>
          </ul>
        </div>
      </div>`

  3: {
    subtitle: "Financial statements are the raw material of every valuation. This chapter teaches you to read them like an analyst — understanding what accountants measure well, what they miss, and where their rules create traps for the unwary.",
    sections: [
      // Section 0: The Basic Accounting Statements
      `<div class="rich-content">
        <p>Before you can value a company, you need to read its financial "medical chart." There are three core documents, each answering a different question:</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>The three financial statements are like three views of the same patient. The <strong>balance sheet</strong> is the X-ray (a frozen snapshot of what the body looks like right now). The <strong>income statement</strong> is the heartbeat monitor (showing flows and activity over a period). The <strong>cash flow statement</strong> is the blood test (revealing what's actually circulating through the system — cash, the lifeblood).</p>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:18px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--terracotta);">Balance Sheet</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0 0 8px;">A snapshot at a <em>point in time</em>: what does the firm own (assets), owe (liabilities), and what's left for shareholders (equity)?</p>
            <div style="font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;text-align:center;padding:8px;background:var(--warm-white);border-radius:6px;">Assets = Liabilities + Equity</div>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--forest);">Income Statement</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0 0 8px;">Activity over a <em>period</em>: how much revenue came in, what were the expenses, and what was left as profit?</p>
            <div style="font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;text-align:center;padding:8px;background:var(--warm-white);border-radius:6px;">Revenue − Expenses = Income</div>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid #2A7B9B;">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:#2A7B9B;">Cash Flow Statement</h4>
            <p style="font-size:12.5px;color:var(--text-secondary);line-height:1.55;margin:0 0 8px;">Where did cash come from and where did it go? Separates operating, investing, and financing activities.</p>
            <div style="font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;text-align:center;padding:8px;background:var(--warm-white);border-radius:6px;">Δ Cash = Operating + Investing + Financing</div>
          </div>
        </div>

        <p>For valuation, the key tension is that accounting is <strong>backward-looking</strong> (recording what happened) while valuation is <strong>forward-looking</strong> (estimating what will happen). We use the past as scaffolding, but the value lives in the future.</p>

      // Section 1: Asset Measurement and Valuation
      `<div class="rich-content">
        <p>How much are a firm's assets really worth? Accounting has a strong answer: "whatever we originally paid, minus depreciation." Financial analysts have a very different answer: "whatever they can earn in the future." This tension runs through everything.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Imagine you bought a vintage guitar for $500 in 1975. The accounting answer to "what's it worth?" is $500 minus 48 years of depreciation — maybe $0. The market answer might be $50,000. Accounting's devotion to historical cost creates a gap between the "book value" on the balance sheet and the real economic value of assets.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Three Principles of Accounting Asset Valuation</p>
        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:18px;color:var(--terracotta);font-weight:700;min-width:26px;">1</span>
            <div><strong style="font-size:14px;">Book value is king</strong><br><span style="font-size:13px;color:var(--text-secondary);">Assets are recorded at original purchase price, adjusted for depreciation. Unless there's a compelling reason to change, book value rules.</span></div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);">
            <span style="font-family:'Fraunces',serif;font-size:18px;color:var(--terracotta);font-weight:700;min-width:26px;">2</span>
            <div><strong style="font-size:14px;">Distrust of market values</strong><br><span style="font-size:13px;color:var(--text-secondary);">Accountants view market prices as volatile and manipulable. They prefer the "objectivity" of what was actually paid.</span></div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;">
            <span style="font-family:'Fraunces',serif;font-size:18px;color:var(--terracotta);font-weight:700;min-width:26px;">3</span>
            <div><strong style="font-size:14px;">When in doubt, be conservative</strong><br><span style="font-size:13px;color:var(--text-secondary);">If there are two possible values, use the lower one. Better to understate assets than overstate them.</span></div>
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Key Asset Categories and Their Quirks</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0;">
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:13.5px;display:block;margin-bottom:4px;">🏭 Fixed Assets</strong>
            <span style="font-size:12.5px;color:var(--text-secondary);line-height:1.5;">Valued at historical cost minus depreciation. Method choice (straight-line vs. accelerated) dramatically affects reported values. Firms often use straight-line for reporting (higher income) and accelerated for taxes (lower taxes).</span>
          </div>
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:13.5px;display:block;margin-bottom:4px;">📦 Inventory</strong>
            <span style="font-size:12.5px;color:var(--text-secondary);line-height:1.5;">Three methods: FIFO (first bought = first sold → higher income in inflation), LIFO (last bought = first sold → lower income, more cash), Weighted Average. Comparing firms using different methods is treacherous without adjustments.</span>
          </div>
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:13.5px;display:block;margin-bottom:4px;">📊 Financial Investments</strong>
            <span style="font-size:12.5px;color:var(--text-secondary);line-height:1.5;">Treatment depends on ownership stake: <em>&lt;20%</em> (minority passive — varies by intent), <em>20–50%</em> (equity method), <em>&gt;50%</em> (full consolidation). The 2008 crisis showed mark-to-market didn't always warn of trouble.</span>
          </div>
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:13.5px;display:block;margin-bottom:4px;">✨ Intangibles & Goodwill</strong>
            <span style="font-size:12.5px;color:var(--text-secondary);line-height:1.5;">Internally developed patents/brands? Expensed immediately — invisible on the balance sheet. Acquired ones? Capitalized. Goodwill = acquisition premium over book value. Now subject to annual impairment tests, not automatic amortization.</span>
          </div>

        <div class="sub-analogy">

          <p>The biggest hidden asset problem: <strong>R&D</strong>. Boeing spends billions on research, but accounting rules expense it all immediately — as if the knowledge evaporates the day it's created. It's like a farmer expensing all seed purchases as if no crop would ever grow. Chapter 9 shows how to fix this by capitalizing R&D.</p>
        </div>
      </div>`,

      // Section 2: Measuring Financing Mix
      `<div class="rich-content">
        <p>The right side of the balance sheet answers: <strong>how did the firm pay for its assets?</strong> Every dollar of assets was funded by either debt (someone else's money) or equity (the owners' money). The mix matters enormously for risk and value.</p>

        <div class="sub-analogy">

          <p>Buying a house with 10% down payment vs. 50% down payment. Same house, same value — but very different risk profiles. The 10%-down buyer is "highly leveraged": a small drop in house value wipes out the equity. The financing mix on the right side of the balance sheet tells you the same story for a company.</p>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Key Components</p>
        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:18px;">🔄</span>

            <li>Book value of equity can be dramatically different from market value — especially for firms with valuable intangibles or growth potential</li>

          </ul>
        </div>
      </div>`,

      // Section 3: Measuring Earnings and Profitability
      `<div class="rich-content">
        <p>The income statement answers: <strong>how much did the firm earn?</strong> But "earn" is a slippery word in accounting. Two big principles govern it — and both create traps.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Imagine a freelancer who completes a $10,000 project in December but doesn't get paid until February. Under <strong>accrual accounting</strong>, the $10K is December income (when the work was done). Under <strong>cash accounting</strong>, it's February income (when the check arrives). Accounting uses accrual — which means reported income and actual cash received can be very different.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">The Expense Classification That Shapes Everything</p>
        <p>How an expense is classified changes where it shows up — and how it affects your perception of the firm:</p>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:14px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;border-top:3px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:13.5px;font-weight:600;margin-bottom:6px;">Operating Expenses</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.5;margin:0;">Benefits this period only. Subtracted from revenue to get operating income. Examples: labor, materials, SG&A.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;border-top:3px solid var(--forest);">
            <h4 style="font-family:'Fraunces',serif;font-size:13.5px;font-weight:600;margin-bottom:6px;">Capital Expenses</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.5;margin:0;">Benefits multiple periods. Spread over asset life as depreciation/amortization. Examples: factories, equipment.</p>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;border-top:3px solid #7B68A8;">
            <h4 style="font-family:'Fraunces',serif;font-size:13.5px;font-weight:600;margin-bottom:6px;">Financing Expenses</h4>
            <p style="font-size:12px;color:var(--text-secondary);line-height:1.5;margin:0;">Cost of borrowed money. Subtracted after operating income. Examples: interest on debt.</p>
          </div>
        </div>

        <div class="myth-card">
          <div class="myth-header">
            <span class="myth-icon">⚠️</span>
            <span class="myth-title">The Two Big Misclassifications</span>
          </div>
          <div class="myth-body">
            Accounting gets two major items wrong: <strong>(1) Operating leases</strong> are treated as operating expenses, but they're really financing expenses (rental payments = debt-like obligations). <strong>(2) R&D</strong> is treated as an operating expense, but it's really a capital expense (it creates assets — knowledge, patents — that generate revenue for years). Both distort operating income, profitability measures, and capital calculations. Chapter 9 shows how to fix them.
          </div>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Key Profitability Ratios</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0;">
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:13px;color:var(--terracotta);">Return on Capital (ROC)</strong>
            <div style="font-family:'JetBrains Mono',monospace;font-size:11.5px;margin:6px 0;padding:8px;background:var(--warm-white);border-radius:4px;text-align:center;">EBIT(1−t) / (BV Debt + BV Equity − Cash)</div>
            <p style="font-size:12px;color:var(--text-secondary);margin:0;">Measures the return on all invested capital. Can be decomposed: ROC = Margin × Turnover. Compare to WACC to assess whether the firm creates or destroys value.</p>
          </div>
          <div style="padding:14px 16px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--border);">
            <strong style="font-size:13px;color:var(--forest);">Return on Equity (ROE)</strong>
            <div style="font-family:'JetBrains Mono',monospace;font-size:11.5px;margin:6px 0;padding:8px;background:var(--warm-white);border-radius:4px;text-align:center;">Net Income / BV of Equity</div>

  4: {
    subtitle: "Risk is the engine of expected returns. This chapter builds from first principles — what risk is, why only some risk matters, and how the major models (CAPM, APT, Fama-French) turn risk into a number you can plug into a valuation.",
    sections: [
      // Section 0: What Is Risk?
      `<div class="rich-content">
        <p>In finance, risk doesn't mean "bad things might happen." It means <strong>actual returns might differ from expected returns</strong> — in either direction. A stock that always returns exactly 10% has no risk. A stock that averages 10% but swings between -30% and +50% is risky — even though the upside is just as "risky" as the downside.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Think of risk like turbulence on a flight. A perfectly smooth flight (guaranteed returns) has zero risk. A bumpy one (volatile returns) is risky — even if you still land safely. The <strong>variance</strong> in the ride is what defines risk, not whether you crash.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">The Two Flavors of Risk</p>
        <p>This is arguably the single most important idea in all of finance:</p>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0;">
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--terracotta);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--terracotta);">Firm-Specific Risk</h4>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.55;margin:0 0 8px;">Affects one company (or a few). A CEO resigns, a product fails, a factory burns down. This risk can be <strong>eliminated by diversification</strong> — holding many stocks cancels out their individual dramas.</p>
            <div style="font-size:11.5px;color:var(--text-muted);padding:8px;background:var(--warm-white);border-radius:6px;text-align:center;">Also called: unsystematic, diversifiable, idiosyncratic risk</div>
          </div>
          <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;border-top:3px solid var(--forest);">
            <h4 style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:6px;color:var(--forest);">Market Risk</h4>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.55;margin:0 0 8px;">Affects all companies: recessions, interest rate shocks, wars, inflation. <strong>Cannot be diversified away</strong> — no matter how many stocks you hold, this risk persists.</p>
            <div style="font-size:11.5px;color:var(--text-muted);padding:8px;background:var(--warm-white);border-radius:6px;text-align:center;">Also called: systematic, non-diversifiable, macro risk</div>
          </div>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>Imagine 100 umbrella vendors on a beach. <em>Firm-specific risk</em>: one vendor's cart breaks. Doesn't affect the others. <em>Market risk</em>: a hurricane hits the beach. Every single vendor is affected, no matter how "diversified" they are within their cart portfolio. Investors only get compensated for hurricane risk — because cart-breaking risk can be diversified away by owning shares in many vendors.</p>
        </div>

        <div class="key-takeaway">
          <div class="kt-label">🎯 The Core Principle</div>
          <ul>
            <li>Only <strong>market risk</strong> gets priced into expected returns — because rational investors diversify away the rest</li>
            <li>This means a very volatile stock can have low "risk" if most of its volatility is firm-specific and uncorrelated with the market</li>
            <li>All the models in this chapter are different ways of measuring market risk</li>
          </ul>
        </div>
      </div>`,

      // Section 1: Equity Risk and Expected Return
      `<div class="rich-content">
        <p>The <strong>Capital Asset Pricing Model (CAPM)</strong> is the workhorse of finance. Despite its simplifying assumptions, it remains the default model in practice because it's intuitive, requires only one firm-specific input (beta), and provides a clean, testable framework.</p>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>The CAPM is like the BMI (Body Mass Index) for risk: a simple, single-number measure that captures something real, even if it misses nuances. Just as BMI uses height and weight to estimate health risk, the CAPM uses <strong>beta</strong> — a single number — to estimate investment risk.</p>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">The CAPM Formula</p>
        <div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 22px;margin:14px 0;font-family:'JetBrains Mono',monospace;font-size:13.5px;text-align:center;line-height:2;">
          E(Rᵢ) = Rf + βᵢ × [E(Rm) − Rf]<br>
          <span style="font-family:'Source Sans 3',sans-serif;font-size:12.5px;color:var(--text-muted);font-style:italic;">Expected Return = Risk-Free Rate + Beta × Equity Risk Premium</span>
        </div>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">Three Ingredients</p>
        <div style="margin:14px 0;">
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:22px;">🏦</span>
            <div><strong style="font-size:14px;">Risk-Free Rate (Rf)</strong><br><span style="font-size:13px;color:var(--text-secondary);">The return on an asset with zero uncertainty — typically a government bond. This is the "sea level" from which all returns are measured as altitude.</span></div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:22px;">📊</span>
            <div><strong style="font-size:14px;">Beta (βᵢ)</strong><br><span style="font-size:13px;color:var(--text-secondary);">How much does the stock move with the market? β=1 means average risk. β=1.5 means 50% more volatile than the market. β=0.5 means half as volatile. Technically: <em>Covariance(stock, market) / Variance(market)</em>.</span></div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:14px;padding:12px 0;">
            <span style="font-size:22px;">📈</span>
            <div><strong style="font-size:14px;">Equity Risk Premium (ERP)</strong><br><span style="font-size:13px;color:var(--text-secondary);">The extra return investors demand for investing in stocks over risk-free bonds. Historically ~4–6% in the U.S. This is the "price of fear" the market charges for uncertainty.</span></div>
          </div>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>The CAPM is like a taxi fare formula: <strong>Base fare</strong> (risk-free rate) + <strong>distance × per-km rate</strong> (beta × ERP). A longer ride (higher beta) costs more. The base fare is what you pay even for zero distance. The per-km rate is what the market charges for each unit of risk you take on.</p>
        </div>
      </div>`,

      // Section 2: Alternative Models for Equity Risk
      `<div class="rich-content">
        <p>The CAPM's simplicity is both its strength and its weakness. Several alternative models try to capture risk more completely — at the cost of more complexity and more inputs.</p>

        <div style="margin:16px 0;">
          <div class="myth-card">
            <div class="myth-header">
              <span class="myth-icon">🧩</span>
              <span class="myth-title">Arbitrage Pricing Model (APT)</span>
            </div>
            <div class="myth-body">
              <p>Instead of one beta against the market, the APT allows <strong>multiple betas against multiple risk factors</strong>. The logic: market risk isn't one monolithic force — it's a combination of inflation risk, interest rate risk, GDP risk, etc. Each factor gets its own beta and risk premium.</p>
              <div style="font-family:'JetBrains Mono',monospace;font-size:12px;margin:10px 0;padding:10px;background:var(--warm-white);border-radius:6px;text-align:center;">
                E(R) = Rf + β₁×RP₁ + β₂×RP₂ + ... + βₖ×RPₖ
              </div>
              <p>The catch? A factor analysis tells you <em>how many</em> factors matter and what the betas are, but it doesn't tell you <em>what</em> the factors represent economically.</p>
            </div>

          <div class="myth-card">
            <div class="myth-header">

            </div>

              <p>The fix for the APT's unnamed factors: <strong>replace statistical factors with observable economic variables</strong>. Chen, Roll, and Ross (1986) identified industrial production, default premiums, term structure shifts, inflation, and real rates as key drivers. The risk: you might pick the wrong factors, and the right factors may change over time.</p>
            </div>
          </div>

          <div class="myth-card">
            <div class="myth-header">
              <span class="myth-icon">📐</span>
              <span class="myth-title">Fama-French / Proxy Models</span>
            </div>
            <div class="myth-body">
              <p>A radical departure: instead of starting from economic theory, <strong>start from the data</strong>. Fama and French found that two firm characteristics — <strong>market capitalization</strong> (small beats large) and <strong>price-to-book ratio</strong> (low P/B beats high P/B) — explained returns better than beta. Their reasoning: if these stocks earn higher returns, they must be riskier. Additional proxies found since: earnings momentum, price momentum, and liquidity.</p>
            </div>
            <div class="myth-verdict">
              <span class="verdict-icon">⚠️</span>
              <span class="verdict-text"><strong>Danger:</strong> Proxy models are statistical, not economic. They can't distinguish a genuine risk factor from a data-mining artifact. And by definition, they make markets always look efficient — any mispricing just becomes "a new risk factor."</span>
            </div>
          </div>
        </div>

        <div class="sub-analogy">
          <div class="sub-analogy-label">Analogy</div>
          <p>If the CAPM is a thermometer (one reading), the APT is a weather station (temperature, humidity, wind, pressure). The multifactor model labels the instruments. And Fama-French is like predicting tomorrow's weather by looking at what happened on similar-looking days in the past — powerful, but prone to false patterns.</p>
        </div>
      </div>`,

      // Section 3: A Comparative Analysis of Equity Risk Models

      // Section 4: Models of Default Risk
      `<div class="rich-content">
        <p>Everything above applies to <strong>equity risk</strong> — the uncertainty in cash flows to shareholders. But when you lend money (buy a bond), the risk is different: it's not about volatility, it's about <strong>whether the borrower pays you back</strong>.</p>

        <p style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:22px 0 10px;color:var(--text-primary);">What Drives Default Risk</p>

        <p>Agencies (S&P, Moody's) distill all of this into a letter grade. The key financial ratios they examine include EBITDA/Interest, FFO/Debt, Debt/EBITDA, and Debt/Capital. Their analysis combines these ratios with qualitative judgment about the firm's prospects.</p>

      // Section 9: Time Series Properties of Price Changes
      `<div class="rich-content">
